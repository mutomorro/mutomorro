<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Source Sans 3', sans-serif;
  }

  .feature {
    width: 1300px;
    height: 731px;
    position: relative;
    overflow: hidden;
    display: flex;
  }

  .text-side {
    position: absolute;
    top: 0;
    left: 0;
    width: 55%;
    height: 100%;
    background: #012169;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 70px 80px 70px;
    clip-path: polygon(0 0, 100% 0, 78% 100%, 0 100%);
  }

  .text-side::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 500px at 10% 85%, rgba(0, 156, 222, 0.1) 0%, transparent 70%),
      radial-gradient(ellipse 500px 400px at 75% 10%, rgba(0, 156, 222, 0.06) 0%, transparent 60%),
      radial-gradient(ellipse 800px 600px at 50% 50%, rgba(0, 48, 135, 0.4) 0%, transparent 70%),
      linear-gradient(160deg, #003087 0%, #012169 40%, #010F3A 100%);
    pointer-events: none;
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
  }

  .blob-1 {
    width: 350px;
    height: 350px;
    bottom: -80px;
    left: -60px;
    background: radial-gradient(ellipse, rgba(0, 156, 222, 0.08) 0%, transparent 70%);
    border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
  }

  .blob-2 {
    width: 250px;
    height: 280px;
    top: -40px;
    right: 60px;
    background: radial-gradient(ellipse, rgba(0, 156, 222, 0.05) 0%, transparent 70%);
    border-radius: 45% 55% 40% 60% / 55% 45% 55% 45%;
  }

  .blob-3 {
    width: 180px;
    height: 180px;
    top: 40%;
    left: 30%;
    background: radial-gradient(ellipse, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
    border-radius: 55% 45% 50% 50% / 45% 55% 45% 55%;
  }

  .organic-line {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .organic-line svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  .label {
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(0, 156, 222, 0.6);
    margin-bottom: 28px;
    position: relative;
    z-index: 2;
  }

  .headline {
    font-weight: 300;
    font-size: 52px;
    line-height: 1.15;
    color: #ffffff;
    letter-spacing: -0.5px;
    margin-bottom: 24px;
    max-width: 500px;
    position: relative;
    z-index: 2;
  }

  .headline em {
    font-style: normal;
    color: #009CDE;
    font-weight: 400;
  }

  .subtitle {
    font-weight: 300;
    font-size: 18px;
    color: rgba(255, 255, 255, 0.55);
    line-height: 1.55;
    max-width: 420px;
    position: relative;
    z-index: 2;
  }

  .client-badge {
    position: absolute;
    bottom: 50px;
    left: 70px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 2;
  }

  .client-name {
    font-weight: 400;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.45);
    letter-spacing: 0.5px;
  }

  .client-divider {
    width: 1px;
    height: 16px;
    background: rgba(255, 255, 255, 0.2);
  }

  .brand-logo {
    display: block;
    height: 16px;
    width: auto;
    opacity: 0.35;
    border: none;
    text-decoration: none;
    vertical-align: middle;
  }

  .image-side {
    position: absolute;
    top: 0;
    right: 0;
    width: 58%;
    height: 100%;
    z-index: 1;
    background:
      url('https://images.unsplash.com/photo-1563013544-824ae1b704d3?q=80&w=2340&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center center / cover no-repeat;
  }

  .image-side::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 30%;
    height: 100%;
    background: linear-gradient(90deg, rgba(1, 33, 105, 0.5) 0%, transparent 100%);
    pointer-events: none;
  }

  .diagonal-accent {
    position: absolute;
    top: 0;
    left: 0;
    width: 55%;
    height: 100%;
    z-index: 3;
    clip-path: polygon(100% 0, 100% 0, 78% 100%, 77.4% 100%);
    background: rgba(0, 156, 222, 0.4);
    pointer-events: none;
  }
</style>
