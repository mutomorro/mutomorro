<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Animation - Operational Effectiveness</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="hero"></canvas>
<script>
(function() {
  var canvas = document.getElementById('hero');
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var W, H, cx, cy;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx = W / 2;
    cy = H / 2;
  }
  resize();
  window.addEventListener('resize', resize);

  var colours = [
    { r: 128, g: 56, b: 143 },
    { r: 155, g: 81, b: 224 },
    { r: 255, g: 66, b: 121 },
    { r: 255, g: 162, b: 0 },
  ];

  function colourAt(t, alpha) {
    t = Math.max(0, Math.min(1, t));
    var idx = t * (colours.length - 1);
    var i = Math.floor(idx);
    var f = idx - i;
    if (i >= colours.length - 1) { i = colours.length - 2; f = 1; }
    var a = colours[i], b = colours[i + 1];
    return 'rgba(' + Math.round(a.r + (b.r - a.r) * f) + ',' +
           Math.round(a.g + (b.g - a.g) * f) + ',' +
           Math.round(a.b + (b.b - a.b) * f) + ',' + alpha + ')';
  }

  // ---- STREAMS ----
  // Multiple flowing streams from left to right at different vertical positions.
  // Each stream has a base path, flow particles travelling along it, and
  // obstacles that create eddies/pooling. Over time, obstacles slowly dissolve.

  var numStreams = 7;
  var streams = [];

  for (var s = 0; s < numStreams; s++) {
    var baseY = H * (0.1 + 0.8 * (s / (numStreams - 1)));
    var colourPos = s / (numStreams - 1);

    // Create obstacles along this stream
    var obstacles = [];
    var numObs = 2 + Math.floor(Math.random() * 2);
    for (var o = 0; o < numObs; o++) {
      obstacles.push({
        x: W * (0.2 + Math.random() * 0.55),
        strength: 0.6 + Math.random() * 0.4, // 1 = full block, fades over time
        dissolveRate: 0.00003 + Math.random() * 0.00003,
        size: 20 + Math.random() * 30,
        phase: Math.random() * Math.PI * 2
      });
    }

    // Flow particles that travel along the stream
    var particles = [];
    var numParticles = 12;
    for (var p = 0; p < numParticles; p++) {
      particles.push({
        progress: Math.random(), // 0 = left edge, 1 = right edge
        speed: 0.0002 + Math.random() * 0.0002,
        yOffset: (Math.random() - 0.5) * 15,
        size: 1.5 + Math.random() * 2,
        alpha: 0.3 + Math.random() * 0.4
      });
    }

    streams.push({
      baseY: baseY,
      colourPos: colourPos,
      amplitude: 15 + Math.random() * 25,
      frequency: 1.5 + Math.random() * 2,
      phase: Math.random() * Math.PI * 2,
      flowSpeed: 0.0002 + Math.random() * 0.0001,
      width: 1.2 + Math.random() * 1.3,
      obstacles: obstacles,
      particles: particles
    });
  }

  // ---- EFFICIENCY GLOWS ----
  // Points along streams where flow is smooth - they glow warmly
  var efficiencyPoints = [];
  for (var i = 0; i < 8; i++) {
    efficiencyPoints.push({
      streamIdx: Math.floor(Math.random() * numStreams),
      xFrac: 0.6 + Math.random() * 0.35, // tend toward the right (clearer flow)
      phase: Math.random() * Math.PI * 2,
      breathSpeed: 0.0008 + Math.random() * 0.0008,
      size: 15 + Math.random() * 25
    });
  }

  // ---- EDDY PARTICLES ----
  // Small particles that spin in circles near obstacles (wasted energy)
  var eddyParticles = [];
  for (var s = 0; s < streams.length; s++) {
    for (var o = 0; o < streams[s].obstacles.length; o++) {
      var obs = streams[s].obstacles[o];
      for (var e = 0; e < 5; e++) {
        eddyParticles.push({
          streamIdx: s,
          obsIdx: o,
          angle: Math.random() * Math.PI * 2,
          dist: 8 + Math.random() * 20,
          speed: 0.002 + Math.random() * 0.003,
          size: 1 + Math.random() * 1.5,
          colourPos: streams[s].colourPos
        });
      }
    }
  }

  // ---- TEXT LABELS ----
  var labels = [
    { text: 'how work actually flows', ring: 0, slot: 0 },
    { text: 'where effort gets wasted', ring: 0, slot: 1 },
    { text: 'what speeds things up', ring: 0, slot: 2 },
    { text: 'what slows them down', ring: 0, slot: 3 },
    { text: 'where handoffs break', ring: 1, slot: 0 },
    { text: 'how decisions bottleneck', ring: 1, slot: 1 },
    { text: 'what people work around', ring: 1, slot: 2 },
    { text: 'where quality drops', ring: 1, slot: 3 },
    { text: 'how teams coordinate', ring: 2, slot: 0 },
    { text: 'what systems help or hinder', ring: 2, slot: 1 },
    { text: 'where the real value happens', ring: 2, slot: 2 },
    { text: 'how improvement becomes normal', ring: 2, slot: 3 },
  ];

  var ringRadii = [115, 200, 285];
  var ringOffsets = [0.2, Math.PI / 4 + 0.3, Math.PI / 5 - 0.2];
  var ringSizes = [13.5, 14, 14.5];

  var textItems = [];
  for (var i = 0; i < labels.length; i++) {
    var l = labels[i];
    var angle = ringOffsets[l.ring] + (l.slot / 4) * Math.PI * 2;
    textItems.push({
      text: l.text,
      baseAngle: angle,
      radius: ringRadii[l.ring],
      phase: Math.random() * Math.PI * 2,
      orbitSpeed: 0.00004 + Math.random() * 0.00003,
      breathSpeed: 0.0003 + Math.random() * 0.0003,
      breathAmount: 8 + Math.random() * 8,
      fadePhase: Math.random() * Math.PI * 2,
      fadeSpeed: 0.0003 + Math.random() * 0.0003,
      colourPos: i / labels.length,
      fontSize: ringSizes[l.ring]
    });
  }

  // ---- HELPER: get stream Y at a given x position ----
  function getStreamY(stream, xFrac, time) {
    var baseWave = Math.sin(xFrac * Math.PI * stream.frequency + time * stream.flowSpeed + stream.phase) * stream.amplitude;

    // Obstacle deflection
    var deflection = 0;
    for (var o = 0; o < stream.obstacles.length; o++) {
      var obs = stream.obstacles[o];
      var obsFrac = obs.x / W;
      var dist = Math.abs(xFrac - obsFrac);
      if (dist < 0.08) {
        var influence = (1 - dist / 0.08);
        // Deflect around obstacle (sinusoidal bump)
        var dir = (xFrac < obsFrac) ? -1 : 1;
        deflection += influence * obs.strength * obs.size * dir * 0.8;
      }
    }

    return stream.baseY + baseWave + deflection;
  }

  // ---- DRAW FUNCTIONS ----

  function drawStreams(time) {
    for (var s = 0; s < streams.length; s++) {
      var stream = streams[s];

      // Draw main stream path
      ctx.beginPath();
      var segments = 150;
      for (var seg = 0; seg <= segments; seg++) {
        var xFrac = seg / segments;
        var x = xFrac * W;
        var y = getStreamY(stream, xFrac, time);
        if (seg === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }

      // Stream colour - gradient left to right
      var streamGrad = ctx.createLinearGradient(0, 0, W, 0);
      streamGrad.addColorStop(0, colourAt(stream.colourPos, 0.15));
      streamGrad.addColorStop(0.3, colourAt(stream.colourPos, 0.2));
      streamGrad.addColorStop(0.7, colourAt(stream.colourPos, 0.25));
      streamGrad.addColorStop(1, colourAt(stream.colourPos, 0.3));
      ctx.strokeStyle = streamGrad;
      ctx.lineWidth = stream.width;
      ctx.stroke();

      // Update and draw obstacles (they dissolve over time)
      for (var o = 0; o < stream.obstacles.length; o++) {
        var obs = stream.obstacles[o];
        obs.strength = Math.max(0, obs.strength - obs.dissolveRate * 16);

        if (obs.strength > 0.05) {
          var obsY = getStreamY(stream, obs.x / W, time);
          var pulse = Math.sin(time * 0.002 + obs.phase) * 0.3;

          // Obstacle glow (reddish when strong, fading)
          var obsAlpha = obs.strength * 0.15;
          var obsGrad = ctx.createRadialGradient(obs.x, obsY, 0, obs.x, obsY, obs.size * obs.strength);
          obsGrad.addColorStop(0, 'rgba(255, 80, 80, ' + (obsAlpha * (0.7 + pulse)) + ')');
          obsGrad.addColorStop(0.5, 'rgba(255, 60, 60, ' + (obsAlpha * 0.3) + ')');
          obsGrad.addColorStop(1, 'rgba(255, 60, 60, 0)');
          ctx.beginPath();
          ctx.arc(obs.x, obsY, obs.size * obs.strength, 0, Math.PI * 2);
          ctx.fillStyle = obsGrad;
          ctx.fill();
        }
      }

      // Draw flow particles
      for (var p = 0; p < stream.particles.length; p++) {
        var particle = stream.particles[p];

        // Speed varies - slower near obstacles
        var localSpeed = particle.speed;
        for (var o = 0; o < stream.obstacles.length; o++) {
          var obs = stream.obstacles[o];
          var dist = Math.abs(particle.progress - obs.x / W);
          if (dist < 0.06 && obs.strength > 0.1) {
            localSpeed *= 0.3 + (1 - obs.strength) * 0.7; // slow near strong obstacles
          }
        }

        particle.progress += localSpeed * 16;
        if (particle.progress > 1.05) particle.progress = -0.05;

        if (particle.progress >= 0 && particle.progress <= 1) {
          var px = particle.progress * W;
          var py = getStreamY(stream, particle.progress, time) + particle.yOffset;

          // Glow
          var pGrad = ctx.createRadialGradient(px, py, 0, px, py, particle.size * 4);
          pGrad.addColorStop(0, colourAt(stream.colourPos, particle.alpha * 0.4));
          pGrad.addColorStop(1, colourAt(stream.colourPos, 0));
          ctx.beginPath();
          ctx.arc(px, py, particle.size * 4, 0, Math.PI * 2);
          ctx.fillStyle = pGrad;
          ctx.fill();

          // Core
          ctx.beginPath();
          ctx.arc(px, py, particle.size, 0, Math.PI * 2);
          ctx.fillStyle = colourAt(stream.colourPos, particle.alpha);
          ctx.fill();
        }
      }
    }
  }

  function drawEddies(time) {
    for (var i = 0; i < eddyParticles.length; i++) {
      var ep = eddyParticles[i];
      var stream = streams[ep.streamIdx];
      var obs = stream.obstacles[ep.obsIdx];

      if (obs.strength < 0.1) continue; // eddy disappears as obstacle dissolves

      var obsY = getStreamY(stream, obs.x / W, time);
      ep.angle += ep.speed * obs.strength * 16;

      var x = obs.x + Math.cos(ep.angle) * ep.dist * obs.strength;
      var y = obsY + Math.sin(ep.angle) * ep.dist * obs.strength * 0.6;

      ctx.beginPath();
      ctx.arc(x, y, ep.size * obs.strength, 0, Math.PI * 2);
      ctx.fillStyle = colourAt(ep.colourPos, 0.2 * obs.strength);
      ctx.fill();
    }
  }

  function drawEfficiencyGlows(time) {
    for (var i = 0; i < efficiencyPoints.length; i++) {
      var ep = efficiencyPoints[i];
      var stream = streams[ep.streamIdx];
      var x = ep.xFrac * W;
      var y = getStreamY(stream, ep.xFrac, time);
      var breathe = Math.sin(time * ep.breathSpeed + ep.phase);
      var size = ep.size * (0.7 + breathe * 0.3);

      // Check: only glow if no nearby obstacle is strong
      var blocked = false;
      for (var o = 0; o < stream.obstacles.length; o++) {
        var obs = stream.obstacles[o];
        if (Math.abs(ep.xFrac - obs.x / W) < 0.1 && obs.strength > 0.3) {
          blocked = true;
          break;
        }
      }

      if (!blocked) {
        var grad = ctx.createRadialGradient(x, y, 0, x, y, size);
        grad.addColorStop(0, colourAt(stream.colourPos, 0.12 + breathe * 0.04));
        grad.addColorStop(0.5, colourAt(stream.colourPos, 0.04));
        grad.addColorStop(1, colourAt(stream.colourPos, 0));
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      }
    }
  }

  function drawTextLabels(time) {
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    for (var i = 0; i < textItems.length; i++) {
      var t = textItems[i];
      var currentAngle = t.baseAngle + time * t.orbitSpeed;
      var radialBreath = Math.sin(time * t.breathSpeed + t.phase) * t.breathAmount;
      var currentRadius = t.radius + radialBreath;
      var x = cx + Math.cos(currentAngle) * currentRadius;
      var y = cy + Math.sin(currentAngle) * currentRadius;
      var fadeCycle = Math.sin(time * t.fadeSpeed + t.fadePhase);
      var alpha = 0.4 + fadeCycle * 0.15;
      var tilt = Math.sin(currentAngle) * 0.04;

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(tilt);

      ctx.shadowColor = colourAt(t.colourPos, 0.5);
      ctx.shadowBlur = 20;
      ctx.font = '400 ' + t.fontSize + 'px "Source Sans 3", "Source Sans Pro", sans-serif';
      ctx.fillStyle = colourAt(t.colourPos, alpha);
      ctx.fillText(t.text, 0, 0);

      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.fillStyle = colourAt(t.colourPos, alpha);
      ctx.fillText(t.text, 0, 0);

      ctx.restore();
    }
  }

  // ---- MAIN LOOP ----
  function tick(time) {
    ctx.clearRect(0, 0, W, H);

    drawStreams(time);
    drawEddies(time);
    drawEfficiencyGlows(time);
    drawTextLabels(time);

    requestAnimationFrame(tick);
  }

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    tick(15000); // Show a later state where some obstacles have dissolved
  } else {
    requestAnimationFrame(tick);
  }
})();
</script>
</body>
</html>
