<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>What customers feel starts with how we work</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#FAF6F1;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block;width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh}</style></head><body><canvas id="c"></canvas>
<script>
(function(){
var canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
var dpr=window.devicePixelRatio||1,W,H;
var rm=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function resize(){W=canvas.parentElement?canvas.parentElement.clientWidth:window.innerWidth;H=canvas.parentElement?canvas.parentElement.clientHeight:window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+"px";canvas.style.height=H+"px";ctx.setTransform(dpr,0,0,dpr,0,0);}
resize();window.addEventListener("resize",resize);
var cols=[{r:128,g:56,b:143},{r:155,g:81,b:224},{r:255,g:66,b:121},{r:255,g:162,b:0}];

var innerNodes=[];for(var i=0;i<12;i++){var a=i*(Math.PI*2/12);
  innerNodes.push({x:0.5+Math.cos(a)*0.12,y:0.5+Math.sin(a)*0.18,activity:0.5+Math.random()*0.5,phase:Math.random()*Math.PI*2,colIdx:i%4});}
var t=0;
function draw(){
  ctx.clearRect(0,0,W,H);t+=0.016;var cx=W*0.5,cy=H*0.5;
  var avgAct=0;for(var i=0;i<innerNodes.length;i++)avgAct+=innerNodes[i].activity;avgAct/=innerNodes.length;
  var outerB=rm?0.6:avgAct*(0.7+Math.sin(t*0.3)*0.1);var outerR=H*0.42;
  ctx.beginPath();ctx.arc(cx,cy,outerR,0,Math.PI*2);
  ctx.strokeStyle="rgba(255,162,0,"+outerB*0.2+")";ctx.lineWidth=12;ctx.stroke();
  ctx.strokeStyle="rgba(255,162,0,"+outerB*0.4+")";ctx.lineWidth=2;ctx.stroke();
  var ig=ctx.createRadialGradient(cx,cy,0,cx,cy,H*0.2);ig.addColorStop(0,"rgba(155,81,224,0.06)");ig.addColorStop(1,"rgba(155,81,224,0)");
  ctx.fillStyle=ig;ctx.beginPath();ctx.arc(cx,cy,H*0.2,0,Math.PI*2);ctx.fill();
  for(var i=0;i<innerNodes.length;i++){var n=innerNodes[i];var c=cols[n.colIdx];
    if(!rm)n.activity=0.4+Math.sin(t*0.3+n.phase)*0.3+Math.sin(t*0.7+n.phase*2)*0.15;
    var px=n.x*W,py=n.y*H;
    var g=ctx.createRadialGradient(px,py,0,px,py,8);
    g.addColorStop(0,"rgba("+c.r+","+c.g+","+c.b+","+n.activity*0.4+")");g.addColorStop(1,"rgba("+c.r+","+c.g+","+c.b+",0)");
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(px,py,8,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fillStyle="rgba("+c.r+","+c.g+","+c.b+","+n.activity*0.6+")";ctx.fill();
    var outerAngle=Math.atan2(n.y-0.5,n.x-0.5);var ox=cx+Math.cos(outerAngle)*outerR,oy=cy+Math.sin(outerAngle)*outerR;
    ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(ox,oy);
    ctx.strokeStyle="rgba("+c.r+","+c.g+","+c.b+","+n.activity*0.08+")";ctx.lineWidth=1;ctx.stroke();}
  if(!rm)requestAnimationFrame(draw);
}draw();

})();
</script></body></html>
