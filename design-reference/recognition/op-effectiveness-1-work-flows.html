<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Work flows, it does not fight</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#FAF6F1;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block;width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh}</style></head><body><canvas id="c"></canvas>
<script>
(function(){
var canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
var dpr=window.devicePixelRatio||1,W,H;
var rm=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function resize(){W=canvas.parentElement?canvas.parentElement.clientWidth:window.innerWidth;H=canvas.parentElement?canvas.parentElement.clientHeight:window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+"px";canvas.style.height=H+"px";ctx.setTransform(dpr,0,0,dpr,0,0);}
resize();window.addEventListener("resize",resize);
var cols=[[128,56,143],[155,81,224],[255,66,121],[255,162,0]];

var particles=[];
for(var i=0;i<50;i++){particles.push({x:Math.random(),y:0.5,speed:0.002+Math.random()*0.003,
  phase:Math.random()*Math.PI*2,amp:0.015+Math.random()*0.03,size:1.5+Math.random()*2,colT:Math.random()});}
function colAt(t2,a){var c=[[128,56,143],[155,81,224],[255,66,121],[255,162,0]];
  t2=Math.max(0,Math.min(1,t2));var idx=t2*(c.length-1);var i=Math.floor(idx);var f=idx-i;
  if(i>=c.length-1){i=c.length-2;f=1;}var c0=c[i],c1=c[i+1];
  return"rgba("+Math.round(c0[0]+(c1[0]-c0[0])*f)+","+Math.round(c0[1]+(c1[1]-c0[1])*f)+","+Math.round(c0[2]+(c1[2]-c0[2])*f)+","+a+")";}
var t=0;
function draw(){
  ctx.clearRect(0,0,W,H);t+=0.016;
  ctx.beginPath();for(var x=0;x<=1;x+=0.01){var y=0.5+Math.sin(x*4+t*0.2)*0.05-0.08;if(x===0)ctx.moveTo(x*W,y*H);else ctx.lineTo(x*W,y*H);}
  ctx.strokeStyle="rgba(155,81,224,0.05)";ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();for(var x=0;x<=1;x+=0.01){var y=0.5+Math.sin(x*4+t*0.2)*0.05+0.08;if(x===0)ctx.moveTo(x*W,y*H);else ctx.lineTo(x*W,y*H);}ctx.stroke();
  for(var i=0;i<particles.length;i++){var p=particles[i];
    if(!rm){p.x+=p.speed;if(p.x>1.1)p.x=-0.1;}
    var channelY=0.5+Math.sin(p.x*4+t*0.2)*0.05;p.y=channelY+Math.sin(t*0.8+p.phase)*p.amp*0.4;
    var px=p.x*W,py=p.y*H;var tx=(p.x-p.speed*4)*W;
    var tg=ctx.createLinearGradient(tx,py,px,py);tg.addColorStop(0,colAt(p.colT,0));tg.addColorStop(1,colAt(p.colT,0.2));
    ctx.strokeStyle=tg;ctx.lineWidth=p.size*0.6;ctx.beginPath();ctx.moveTo(tx,py);ctx.lineTo(px,py);ctx.stroke();
    var g=ctx.createRadialGradient(px,py,0,px,py,p.size*3);g.addColorStop(0,colAt(p.colT,0.25));g.addColorStop(1,colAt(p.colT,0));
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(px,py,p.size*3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(px,py,p.size,0,Math.PI*2);ctx.fillStyle=colAt(p.colT,0.5);ctx.fill();}
  if(!rm)requestAnimationFrame(draw);
}draw();

})();
</script></body></html>
