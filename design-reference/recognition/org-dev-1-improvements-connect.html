<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Improvements connect to each other</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#FAF6F1;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block;width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh}</style></head><body><canvas id="c"></canvas>
<script>
(function(){
var canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
var dpr=window.devicePixelRatio||1,W,H;
var rm=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function resize(){W=canvas.parentElement?canvas.parentElement.clientWidth:window.innerWidth;H=canvas.parentElement?canvas.parentElement.clientHeight:window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+"px";canvas.style.height=H+"px";ctx.setTransform(dpr,0,0,dpr,0,0);}
resize();window.addEventListener("resize",resize);
var cols=[[128,56,143],[155,81,224],[255,66,121],[255,162,0]];

var sources=[];for(var i=0;i<7;i++)sources.push({x:0.1+Math.random()*0.8,y:0.12+Math.random()*0.76,
  interval:2+Math.random()*3,timer:Math.random()*2,ripples:[],colIdx:i%4});
var t=0;
function draw(){
  ctx.clearRect(0,0,W,H);t+=0.016;
  for(var s=0;s<sources.length;s++){var src=sources[s];var c=cols[src.colIdx];
    if(!rm){src.timer+=0.016;if(src.timer>src.interval){src.timer=0;src.ripples.push({born:t,r:0});}}
    ctx.beginPath();ctx.arc(src.x*W,src.y*H,3,0,Math.PI*2);ctx.fillStyle="rgba("+c[0]+","+c[1]+","+c[2]+",0.3)";ctx.fill();
    for(var r=src.ripples.length-1;r>=0;r--){var rip=src.ripples[r];var age=t-rip.born;rip.r=age*40;
      var alpha=Math.max(0,0.2-age*0.03);if(alpha<=0){src.ripples.splice(r,1);continue;}
      ctx.beginPath();ctx.arc(src.x*W,src.y*H,rip.r,0,Math.PI*2);
      ctx.strokeStyle="rgba("+c[0]+","+c[1]+","+c[2]+","+alpha+")";ctx.lineWidth=1.5;ctx.stroke();
      ctx.strokeStyle="rgba("+c[0]+","+c[1]+","+c[2]+","+alpha*0.3+")";ctx.lineWidth=5;ctx.stroke();}}
  if(!rm)requestAnimationFrame(draw);
}draw();

})();
</script></body></html>
