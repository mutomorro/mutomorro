<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Services are shaped by the people who use them</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#FAF6F1;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block;width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh}</style></head><body><canvas id="c"></canvas>
<script>
(function(){
var canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
var dpr=window.devicePixelRatio||1,W,H;
var rm=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function resize(){W=canvas.parentElement?canvas.parentElement.clientWidth:window.innerWidth;H=canvas.parentElement?canvas.parentElement.clientHeight:window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+"px";canvas.style.height=H+"px";ctx.setTransform(dpr,0,0,dpr,0,0);}
resize();window.addEventListener("resize",resize);

var form=[];for(var i=0;i<20;i++)form.push({x:0.5,y:0.15+i*0.035,baseX:0.5,leftPush:0,rightPush:0});
var t=0;
function draw(){
  ctx.clearRect(0,0,W,H);t+=0.016;
  for(var i=0;i<form.length;i++){var f=form[i];
    var lw=Math.sin(t*0.5+i*0.5)*0.025+Math.sin(t*0.3+i*0.8)*0.015;
    var rw=Math.sin(t*0.4+i*0.6)*0.02+Math.cos(t*0.35+i*0.7)*0.015;
    if(!rm){f.leftPush+=(lw-f.leftPush)*0.05;f.rightPush+=(rw-f.rightPush)*0.05;}
    else{f.leftPush=lw;f.rightPush=rw;}f.x=f.baseX+f.leftPush-f.rightPush;}
  ctx.beginPath();
  for(var i=0;i<form.length;i++){if(i===0)ctx.moveTo(form[i].x*W-15,form[i].y*H);else ctx.lineTo(form[i].x*W-15,form[i].y*H);}
  for(var i=form.length-1;i>=0;i--)ctx.lineTo(form[i].x*W+15,form[i].y*H);
  ctx.closePath();
  var fg=ctx.createLinearGradient(W*0.3,0,W*0.7,0);
  fg.addColorStop(0,"rgba(155,81,224,0.15)");fg.addColorStop(0.5,"rgba(200,120,180,0.2)");fg.addColorStop(1,"rgba(255,162,0,0.15)");
  ctx.fillStyle=fg;ctx.fill();ctx.strokeStyle="rgba(200,140,200,0.2)";ctx.lineWidth=1;ctx.stroke();
  for(var i=0;i<6;i++){var py=(0.2+i*0.07)*H;var px=(0.25+Math.sin(t*0.3+i)*0.04)*W;
    ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fillStyle="rgba(155,81,224,0.3)";ctx.fill();
    ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(form[i*3].x*W-15,form[i*3].y*H);
    ctx.strokeStyle="rgba(155,81,224,0.06)";ctx.lineWidth=1;ctx.stroke();}
  for(var i=0;i<6;i++){var py=(0.2+i*0.07)*H;var px=(0.75+Math.sin(t*0.35+i)*0.04)*W;
    ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fillStyle="rgba(255,162,0,0.3)";ctx.fill();
    ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(form[i*3].x*W+15,form[i*3].y*H);
    ctx.strokeStyle="rgba(255,162,0,0.06)";ctx.lineWidth=1;ctx.stroke();}
  if(!rm)requestAnimationFrame(draw);
}draw();

})();
</script></body></html>
