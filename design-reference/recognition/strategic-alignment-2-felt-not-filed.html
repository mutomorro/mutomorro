<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Strategy is felt, not just filed</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#FAF6F1;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block;width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh}</style></head><body><canvas id="c"></canvas>
<script>
(function(){
var canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
var dpr=window.devicePixelRatio||1,W,H;
var rm=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function resize(){W=canvas.parentElement?canvas.parentElement.clientWidth:window.innerWidth;H=canvas.parentElement?canvas.parentElement.clientHeight:window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+"px";canvas.style.height=H+"px";ctx.setTransform(dpr,0,0,dpr,0,0);}
resize();window.addEventListener("resize",resize);
var cols=[[128,56,143],[155,81,224],[255,66,121],[255,162,0]];

var shapes=[];for(var i=0;i<18;i++)shapes.push({x:0.05+Math.random()*0.9,y:0.1+Math.random()*0.8,
  size:12+Math.random()*18,type:Math.floor(Math.random()*3),colIdx:i%4,rotation:Math.random()*Math.PI});
var t=0;
function draw(){
  ctx.clearRect(0,0,W,H);t+=0.016;
  for(var i=0;i<shapes.length;i++){var s=shapes[i];var c=cols[s.colIdx];var px=s.x*W,py=s.y*H;
    ctx.save();ctx.translate(px,py);ctx.rotate(s.rotation);ctx.beginPath();
    if(s.type===0)ctx.rect(-s.size/2,-s.size/2,s.size,s.size);
    else if(s.type===1)ctx.arc(0,0,s.size/2,0,Math.PI*2);
    else{ctx.moveTo(0,-s.size/2);ctx.lineTo(s.size/2,s.size/2);ctx.lineTo(-s.size/2,s.size/2);ctx.closePath();}
    ctx.fillStyle="rgba("+c[0]+","+c[1]+","+c[2]+",0.08)";ctx.fill();
    ctx.strokeStyle="rgba("+c[0]+","+c[1]+","+c[2]+",0.15)";ctx.lineWidth=1;ctx.stroke();ctx.restore();}
  var sorted=shapes.slice().sort(function(a,b){return a.x-b.x;});
  ctx.beginPath();
  for(var i=0;i<sorted.length;i++){var s=sorted[i];
    if(i===0)ctx.moveTo(s.x*W,s.y*H);
    else{var prev=sorted[i-1];var midX=(prev.x+s.x)/2*W,midY=(prev.y+s.y)/2*H+Math.sin(i)*12;
      ctx.quadraticCurveTo(midX,midY,s.x*W,s.y*H);}}
  var pulse=rm?1:0.7+Math.sin(t*0.5)*0.3;
  ctx.strokeStyle="rgba(255,180,50,"+0.3*pulse+")";ctx.lineWidth=2;ctx.stroke();
  ctx.strokeStyle="rgba(255,180,50,"+0.08*pulse+")";ctx.lineWidth=8;ctx.stroke();
  if(!rm){var ti=Math.floor((t*2)%sorted.length);var s=sorted[ti];var spx=s.x*W,spy=s.y*H;
    var tg=ctx.createRadialGradient(spx,spy,0,spx,spy,12);tg.addColorStop(0,"rgba(255,220,100,0.4)");tg.addColorStop(1,"rgba(255,220,100,0)");
    ctx.fillStyle=tg;ctx.beginPath();ctx.arc(spx,spy,12,0,Math.PI*2);ctx.fill();}
  if(!rm)requestAnimationFrame(draw);
}draw();

})();
</script></body></html>
