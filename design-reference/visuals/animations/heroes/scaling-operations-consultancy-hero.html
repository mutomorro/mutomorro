<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Animation - Scaling Operations</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="hero"></canvas>
<script>
(function() {
  var canvas = document.getElementById('hero');
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var W, H, cx, cy;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx = W / 2;
    cy = H / 2;
  }
  resize();
  window.addEventListener('resize', resize);

  var colours = [
    { r: 128, g: 56, b: 143 },
    { r: 155, g: 81, b: 224 },
    { r: 255, g: 66, b: 121 },
    { r: 255, g: 162, b: 0 },
  ];

  function colourAt(t, alpha) {
    t = Math.max(0, Math.min(1, t));
    var idx = t * (colours.length - 1);
    var i = Math.floor(idx);
    var f = idx - i;
    if (i >= colours.length - 1) { i = colours.length - 2; f = 1; }
    var a = colours[i], b = colours[i + 1];
    return 'rgba(' + Math.round(a.r + (b.r - a.r) * f) + ',' +
           Math.round(a.g + (b.g - a.g) * f) + ',' +
           Math.round(a.b + (b.b - a.b) * f) + ',' + alpha + ')';
  }

  // ---- THE EXPANDING STRUCTURE ----
  // A network of nodes and connections that breathes between a compact state
  // and an expanded state. During expansion, some connections strain (glow red),
  // new nodes appear, and new connections form to replace strained ones.

  // Growth cycle: oscillates between compact and expanded
  var growthSpeed = 0.00006;

  function getGrowth(time) {
    // Oscillates 0 to 1 (compact to expanded)
    return (Math.sin(time * growthSpeed) + 1) / 2;
  }

  // ---- STRUCTURAL NODES ----
  // Core nodes (always present) and growth nodes (appear during expansion)
  var coreNodes = [];
  var numCore = 18;
  for (var i = 0; i < numCore; i++) {
    var angle = (i / numCore) * Math.PI * 2;
    var layer = Math.floor(i / 6);
    var dist = 30 + layer * 40;
    coreNodes.push({
      compactX: Math.cos(angle + layer * 0.2) * dist,
      compactY: Math.sin(angle + layer * 0.2) * dist,
      expandedX: Math.cos(angle + layer * 0.15) * dist * 2.2,
      expandedY: Math.sin(angle + layer * 0.15) * dist * 2.2,
      size: 2.5 + Math.random() * 2.5,
      colourPos: i / numCore,
      breathPhase: Math.random() * Math.PI * 2,
      breathSpeed: 0.0008 + Math.random() * 0.001,
      importance: 0.4 + Math.random() * 0.6
    });
  }

  // Growth nodes - only visible when expanded
  var growthNodes = [];
  var numGrowth = 12;
  for (var i = 0; i < numGrowth; i++) {
    var angle = Math.random() * Math.PI * 2;
    var dist = 100 + Math.random() * 100;
    growthNodes.push({
      expandedX: Math.cos(angle) * dist,
      expandedY: Math.sin(angle) * dist,
      size: 2 + Math.random() * 2,
      colourPos: 0.3 + Math.random() * 0.5,
      breathPhase: Math.random() * Math.PI * 2,
      breathSpeed: 0.001 + Math.random() * 0.001,
      appearThreshold: 0.3 + Math.random() * 0.4 // growth level when this node appears
    });
  }

  // ---- CONNECTIONS ----
  var coreConnections = [];
  for (var i = 0; i < numCore; i++) {
    for (var j = i + 1; j < numCore; j++) {
      var dx = coreNodes[i].compactX - coreNodes[j].compactX;
      var dy = coreNodes[i].compactY - coreNodes[j].compactY;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 70 && Math.random() > 0.3) {
        // Calculate strain - how much does this connection stretch during expansion?
        var edx = coreNodes[i].expandedX - coreNodes[j].expandedX;
        var edy = coreNodes[i].expandedY - coreNodes[j].expandedY;
        var expandedDist = Math.sqrt(edx * edx + edy * edy);
        var strainRatio = expandedDist / Math.max(dist, 1);

        coreConnections.push({
          from: i, to: j,
          strain: Math.max(0, strainRatio - 1.5), // strain if stretched more than 1.5x
          colourPos: (coreNodes[i].colourPos + coreNodes[j].colourPos) / 2
        });
      }
    }
  }

  // New connections that form during expansion (strengthening the expanded structure)
  var newConnections = [];
  for (var i = 0; i < numCore; i++) {
    for (var g = 0; g < numGrowth; g++) {
      var dx = coreNodes[i].expandedX - growthNodes[g].expandedX;
      var dy = coreNodes[i].expandedY - growthNodes[g].expandedY;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 80 && Math.random() > 0.5) {
        newConnections.push({
          coreIdx: i,
          growthIdx: g,
          colourPos: (coreNodes[i].colourPos + growthNodes[g].colourPos) / 2
        });
      }
    }
  }

  // ---- CULTURE PARTICLES ----
  // Small warm particles that flow through the structure - the culture,
  // relationships, and good things that must survive scaling
  var cultureParticles = [];
  var numCulture = 25;
  for (var i = 0; i < numCulture; i++) {
    var connIdx = Math.floor(Math.random() * coreConnections.length);
    cultureParticles.push({
      connIdx: connIdx,
      progress: Math.random(),
      speed: 0.003 + Math.random() * 0.004,
      direction: Math.random() > 0.5 ? 1 : -1,
      size: 1.5 + Math.random() * 2,
      colourPos: 0.6 + Math.random() * 0.35, // warm - these are the good things
      alpha: 0.35 + Math.random() * 0.3
    });
  }

  // ---- STRAIN FLASHES ----
  // Brief red-ish flashes when connections are under strain during expansion
  var strainFlashes = [];

  // ---- REPAIR PULSES ----
  // When new connections form, a brief pulse of energy
  var repairPulses = [];

  // ---- WARM CORE GLOW ----
  // The culture/heart at the centre - stays warm regardless of scale

  // ---- TEXT LABELS ----
  var labels = [
    { text: 'what strains first', ring: 0, slot: 0 },
    { text: 'what culture to protect', ring: 0, slot: 1 },
    { text: 'how communication changes', ring: 0, slot: 2 },
    { text: 'what breaks at scale', ring: 0, slot: 3 },
    { text: 'which processes stop working', ring: 1, slot: 0 },
    { text: 'how decisions slow down', ring: 1, slot: 1 },
    { text: 'when founders can\'t hold everything', ring: 1, slot: 2 },
    { text: 'what growth costs', ring: 1, slot: 3 },
    { text: 'how new people absorb the culture', ring: 2, slot: 0 },
    { text: 'whether quality holds', ring: 2, slot: 1 },
    { text: 'what gets harder as you grow', ring: 2, slot: 2 },
    { text: 'how to evolve without losing the spark', ring: 2, slot: 3 },
  ];

  var ringRadii = [125, 215, 300];
  var ringOffsets = [0.15, Math.PI / 4 + 0.1, Math.PI / 6 - 0.15];
  var ringSizes = [13.5, 14, 14.5];

  var textItems = [];
  for (var i = 0; i < labels.length; i++) {
    var l = labels[i];
    var angle = ringOffsets[l.ring] + (l.slot / 4) * Math.PI * 2;
    textItems.push({
      text: l.text,
      baseAngle: angle,
      radius: ringRadii[l.ring],
      phase: Math.random() * Math.PI * 2,
      orbitSpeed: 0.00004 + Math.random() * 0.00003,
      breathSpeed: 0.0003 + Math.random() * 0.0003,
      breathAmount: 8 + Math.random() * 8,
      fadePhase: Math.random() * Math.PI * 2,
      fadeSpeed: 0.0003 + Math.random() * 0.0003,
      colourPos: i / labels.length,
      fontSize: ringSizes[l.ring]
    });
  }

  // ---- HELPERS ----

  function lerp(a, b, t) { return a + (b - a) * t; }

  function getCoreNodePos(node, growth, time) {
    var breathe = Math.sin(time * node.breathSpeed + node.breathPhase);
    var x = cx + lerp(node.compactX, node.expandedX, growth) + breathe * 2;
    var y = cy + lerp(node.compactY, node.expandedY, growth) + Math.sin(breathe * 1.3) * 1.5;
    return { x: x, y: y };
  }

  function getGrowthNodePos(node, growth, time) {
    var breathe = Math.sin(time * node.breathSpeed + node.breathPhase);
    var visibility = Math.max(0, Math.min(1, (growth - node.appearThreshold) / 0.2));
    var x = cx + node.expandedX * growth + breathe * 2;
    var y = cy + node.expandedY * growth + Math.sin(breathe * 1.3) * 1.5;
    return { x: x, y: y, visibility: visibility };
  }

  // ---- DRAW FUNCTIONS ----

  function drawCoreConnections(time, growth) {
    var prevGrowth = getGrowth(time - 100);

    for (var c = 0; c < coreConnections.length; c++) {
      var conn = coreConnections[c];
      var p1 = getCoreNodePos(coreNodes[conn.from], growth, time);
      var p2 = getCoreNodePos(coreNodes[conn.to], growth, time);

      var currentStrain = conn.strain * growth;
      var alpha = 0.1 - currentStrain * 0.04;
      if (alpha < 0.01) continue;

      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);

      if (currentStrain > 0.3) {
        // Strained connection - shifts toward red
        var strainAlpha = alpha + currentStrain * 0.05;
        var r = Math.round(200 + currentStrain * 55);
        var g = Math.round(60 - currentStrain * 30);
        var b = Math.round(60 - currentStrain * 30);
        ctx.strokeStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + strainAlpha + ')';
        ctx.lineWidth = 0.5 + currentStrain * 0.5;

        // Trigger strain flash at peak expansion
        if (growth > 0.85 && prevGrowth <= 0.85 && Math.random() > 0.5) {
          strainFlashes.push({
            x: (p1.x + p2.x) / 2,
            y: (p1.y + p2.y) / 2,
            born: time,
            life: 800
          });
        }
      } else {
        ctx.strokeStyle = colourAt(conn.colourPos, alpha);
        ctx.lineWidth = 0.7;
      }
      ctx.stroke();
    }
  }

  function drawNewConnections(time, growth) {
    for (var c = 0; c < newConnections.length; c++) {
      var conn = newConnections[c];
      var gn = getGrowthNodePos(growthNodes[conn.growthIdx], growth, time);
      if (gn.visibility < 0.1) continue;

      var cn = getCoreNodePos(coreNodes[conn.coreIdx], growth, time);
      var alpha = 0.08 * gn.visibility;

      ctx.beginPath();
      ctx.moveTo(cn.x, cn.y);
      ctx.lineTo(gn.x, gn.y);
      ctx.strokeStyle = colourAt(conn.colourPos, alpha);
      ctx.lineWidth = 0.6;
      ctx.stroke();
    }
  }

  function drawCoreNodes(time, growth) {
    for (var i = 0; i < numCore; i++) {
      var node = coreNodes[i];
      var pos = getCoreNodePos(node, growth, time);
      var breathe = Math.sin(time * node.breathSpeed + node.breathPhase);
      var size = node.size * (0.85 + breathe * 0.15);

      // Glow
      var glowSize = size * (2.5 + node.importance * 2.5);
      var glowGrad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, glowSize);
      glowGrad.addColorStop(0, colourAt(node.colourPos, 0.12 * node.importance));
      glowGrad.addColorStop(1, colourAt(node.colourPos, 0));
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, glowSize, 0, Math.PI * 2);
      ctx.fillStyle = glowGrad;
      ctx.fill();

      // Core
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
      ctx.fillStyle = colourAt(node.colourPos, 0.4 + node.importance * 0.35);
      ctx.fill();
    }
  }

  function drawGrowthNodes(time, growth) {
    for (var i = 0; i < numGrowth; i++) {
      var node = growthNodes[i];
      var pos = getGrowthNodePos(node, growth, time);
      if (pos.visibility < 0.05) continue;

      var breathe = Math.sin(time * node.breathSpeed + node.breathPhase);
      var size = node.size * (0.8 + breathe * 0.2) * pos.visibility;

      // Glow
      var glowSize = size * 3;
      var glowGrad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, glowSize);
      glowGrad.addColorStop(0, colourAt(node.colourPos, 0.15 * pos.visibility));
      glowGrad.addColorStop(1, colourAt(node.colourPos, 0));
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, glowSize, 0, Math.PI * 2);
      ctx.fillStyle = glowGrad;
      ctx.fill();

      // Core - slightly brighter to show they're new
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
      ctx.fillStyle = colourAt(node.colourPos, 0.5 * pos.visibility);
      ctx.fill();

      // Tiny ring to indicate newness
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, size * 1.8, 0, Math.PI * 2);
      ctx.strokeStyle = colourAt(node.colourPos, 0.08 * pos.visibility);
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }

  function drawCultureParticles(time, growth) {
    for (var i = 0; i < cultureParticles.length; i++) {
      var cp = cultureParticles[i];
      var conn = coreConnections[cp.connIdx];

      var p1 = getCoreNodePos(coreNodes[conn.from], growth, time);
      var p2 = getCoreNodePos(coreNodes[conn.to], growth, time);

      // Speed affected by strain - culture flows slower through strained connections
      var strain = conn.strain * growth;
      var speedMult = 1 - strain * 0.5;

      cp.progress += cp.speed * cp.direction * speedMult * 16;
      if (cp.progress > 1) { cp.progress = 1; cp.direction = -1; }
      if (cp.progress < 0) { cp.progress = 0; cp.direction = 1; }

      var x = p1.x + (p2.x - p1.x) * cp.progress;
      var y = p1.y + (p2.y - p1.y) * cp.progress;

      // Glow - culture particles are warm
      var glowGrad = ctx.createRadialGradient(x, y, 0, x, y, cp.size * 5);
      glowGrad.addColorStop(0, colourAt(cp.colourPos, cp.alpha * 0.3));
      glowGrad.addColorStop(1, colourAt(cp.colourPos, 0));
      ctx.beginPath();
      ctx.arc(x, y, cp.size * 5, 0, Math.PI * 2);
      ctx.fillStyle = glowGrad;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(x, y, cp.size, 0, Math.PI * 2);
      ctx.fillStyle = colourAt(cp.colourPos, cp.alpha);
      ctx.fill();
    }
  }

  function drawStrainFlashes(time) {
    for (var i = strainFlashes.length - 1; i >= 0; i--) {
      var sf = strainFlashes[i];
      var age = time - sf.born;
      if (age > sf.life) { strainFlashes.splice(i, 1); continue; }
      var progress = age / sf.life;
      var alpha = (1 - progress) * 0.2;
      var size = 5 + progress * 20;

      var grad = ctx.createRadialGradient(sf.x, sf.y, 0, sf.x, sf.y, size);
      grad.addColorStop(0, 'rgba(255, 80, 60, ' + alpha + ')');
      grad.addColorStop(0.5, 'rgba(255, 60, 60, ' + (alpha * 0.3) + ')');
      grad.addColorStop(1, 'rgba(255, 60, 60, 0)');
      ctx.beginPath();
      ctx.arc(sf.x, sf.y, size, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }
  }

  function drawWarmCore(time, growth) {
    // The heart - culture - stays warm regardless of scale
    // Gets slightly stretched during expansion but never breaks
    var pulse = Math.sin(time * 0.0007) * 0.3;
    var size = 35 + pulse * 8;

    var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, size);
    grad.addColorStop(0, colourAt(0.7, 0.15 + pulse * 0.03)); // warm centre
    grad.addColorStop(0.4, colourAt(0.6, 0.06));
    grad.addColorStop(1, colourAt(0.5, 0));
    ctx.beginPath();
    ctx.arc(cx, cy, size, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Bright warm core dot
    ctx.beginPath();
    ctx.arc(cx, cy, 4 + pulse * 2, 0, Math.PI * 2);
    ctx.fillStyle = colourAt(0.75, 0.5 + pulse * 0.2);
    ctx.fill();
  }

  // Outer boundary - shows the current "scale" of the organisation
  function drawScaleBoundary(time, growth) {
    var maxR = 80 + growth * 140;
    var breathe = Math.sin(time * 0.0004) * 5;

    ctx.beginPath();
    // Organic boundary
    var segments = 60;
    for (var s = 0; s <= segments; s++) {
      var angle = (s / segments) * Math.PI * 2;
      var wobble = Math.sin(angle * 5 + time * 0.0003) * 5 + Math.sin(angle * 3 + time * 0.0002) * 3;
      var r = maxR + breathe + wobble;
      var x = cx + Math.cos(angle) * r;
      var y = cy + Math.sin(angle) * r;
      if (s === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = colourAt(0.4, 0.05 + growth * 0.03);
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function drawTextLabels(time) {
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    for (var i = 0; i < textItems.length; i++) {
      var t = textItems[i];
      var currentAngle = t.baseAngle + time * t.orbitSpeed;
      var radialBreath = Math.sin(time * t.breathSpeed + t.phase) * t.breathAmount;
      var currentRadius = t.radius + radialBreath;
      var x = cx + Math.cos(currentAngle) * currentRadius;
      var y = cy + Math.sin(currentAngle) * currentRadius;
      var fadeCycle = Math.sin(time * t.fadeSpeed + t.fadePhase);
      var alpha = 0.4 + fadeCycle * 0.15;
      var tilt = Math.sin(currentAngle) * 0.04;

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(tilt);

      ctx.shadowColor = colourAt(t.colourPos, 0.5);
      ctx.shadowBlur = 20;
      ctx.font = '400 ' + t.fontSize + 'px "Source Sans 3", "Source Sans Pro", sans-serif';
      ctx.fillStyle = colourAt(t.colourPos, alpha);
      ctx.fillText(t.text, 0, 0);

      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.fillStyle = colourAt(t.colourPos, alpha);
      ctx.fillText(t.text, 0, 0);

      ctx.restore();
    }
  }

  // ---- MAIN LOOP ----
  function tick(time) {
    ctx.clearRect(0, 0, W, H);

    var growth = getGrowth(time);

    drawScaleBoundary(time, growth);
    drawCoreConnections(time, growth);
    drawNewConnections(time, growth);
    drawCoreNodes(time, growth);
    drawGrowthNodes(time, growth);
    drawCultureParticles(time, growth);
    drawStrainFlashes(time);
    drawWarmCore(time, growth);
    drawTextLabels(time);

    requestAnimationFrame(tick);
  }

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    tick(12000);
  } else {
    requestAnimationFrame(tick);
  }
})();
</script>
</body>
</html>
