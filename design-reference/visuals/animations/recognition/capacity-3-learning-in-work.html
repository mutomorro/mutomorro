<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Learning is part of the work, not separate from it</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#FAF6F1;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block;width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh}</style></head><body><canvas id="c"></canvas>
<script>
(function(){
var canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
var dpr=window.devicePixelRatio||1,W,H;
var rm=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function resize(){W=canvas.parentElement?canvas.parentElement.clientWidth:window.innerWidth;H=canvas.parentElement?canvas.parentElement.clientHeight:window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+"px";canvas.style.height=H+"px";ctx.setTransform(dpr,0,0,dpr,0,0);}
resize();window.addEventListener("resize",resize);

var threads=[];for(var i=0;i<30;i++){var isL=i%2===0;
  threads.push({startX:-0.05+i*0.035,isLearning:isL,phase:Math.random()*Math.PI*2,amp:0.025+Math.random()*0.03,freq:2+Math.random()*2});}
var t=0;
function draw(){
  ctx.clearRect(0,0,W,H);t+=0.016;
  for(var i=0;i<threads.length;i++){var th=threads[i];var col=th.isLearning?[155,81,224]:[255,162,0];
    ctx.beginPath();
    for(var x=0;x<=1;x+=0.01){var y=0.5+Math.sin((x+th.startX)*th.freq*Math.PI+(rm?0:t*0.3)+th.phase)*th.amp+Math.sin(x*20+i)*0.004;
      if(x===0)ctx.moveTo(x*W,y*H);else ctx.lineTo(x*W,y*H);}
    ctx.strokeStyle="rgba("+col[0]+","+col[1]+","+col[2]+",0.25)";ctx.lineWidth=2;ctx.stroke();
    ctx.strokeStyle="rgba("+col[0]+","+col[1]+","+col[2]+",0.06)";ctx.lineWidth=6;ctx.stroke();}
  if(!rm)requestAnimationFrame(draw);
}draw();

})();
</script></body></html>
