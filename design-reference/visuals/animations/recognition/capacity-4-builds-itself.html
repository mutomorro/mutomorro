<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>The organisation builds itself</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#FAF6F1;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block;width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh}</style></head><body><canvas id="c"></canvas>
<script>
(function(){
var canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
var dpr=window.devicePixelRatio||1,W,H;
var rm=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function resize(){W=canvas.parentElement?canvas.parentElement.clientWidth:window.innerWidth;H=canvas.parentElement?canvas.parentElement.clientHeight:window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+"px";canvas.style.height=H+"px";ctx.setTransform(dpr,0,0,dpr,0,0);}
resize();window.addEventListener("resize",resize);
var cols=[[128,56,143],[155,81,224],[255,66,121],[255,162,0]];

var layers=[];var maxLayers=7;var layerInterval=2;var t=0;
function draw(){
  ctx.clearRect(0,0,W,H);t+=0.016;var cx=W*0.5,cy=H*0.5;
  var expected=Math.min(maxLayers,Math.floor(t/layerInterval)+1);
  while(layers.length<expected){var idx=layers.length;
    layers.push({born:idx*layerInterval,radius:0,targetR:(0.04+idx*0.05)*H,col:cols[idx%4],thickness:2+idx*0.5,alpha:0});}
  for(var i=layers.length-1;i>=0;i--){var l=layers[i];var elapsed=t-l.born;
    if(!rm){var grow=Math.min(1,elapsed*0.2);grow=grow*grow*(3-2*grow);l.radius=l.targetR*grow;l.alpha=Math.min(0.5,grow*0.5);}
    else{l.radius=l.targetR;l.alpha=0.4;}
    var breathe=rm?1:1+Math.sin(t*0.4+i*0.7)*0.015;var r=l.radius*breathe;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle="rgba("+l.col[0]+","+l.col[1]+","+l.col[2]+","+l.alpha*0.15+")";ctx.lineWidth=l.thickness*5;ctx.stroke();
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle="rgba("+l.col[0]+","+l.col[1]+","+l.col[2]+","+l.alpha+")";ctx.lineWidth=l.thickness;ctx.stroke();}
  var ig=ctx.createRadialGradient(cx,cy,0,cx,cy,30);ig.addColorStop(0,"rgba(255,200,100,0.2)");ig.addColorStop(1,"rgba(255,200,100,0)");
  ctx.fillStyle=ig;ctx.beginPath();ctx.arc(cx,cy,30,0,Math.PI*2);ctx.fill();
  if(!rm)requestAnimationFrame(draw);
}draw();

})();
</script></body></html>
