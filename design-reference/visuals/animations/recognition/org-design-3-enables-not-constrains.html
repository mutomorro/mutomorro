<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>The design enables, not constrains</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#FAF6F1;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block;width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh}</style></head><body><canvas id="c"></canvas>
<script>
(function(){
var canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
var dpr=window.devicePixelRatio||1,W,H;
var rm=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function resize(){W=canvas.parentElement?canvas.parentElement.clientWidth:window.innerWidth;H=canvas.parentElement?canvas.parentElement.clientHeight:window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+"px";canvas.style.height=H+"px";ctx.setTransform(dpr,0,0,dpr,0,0);}
resize();window.addEventListener("resize",resize);
var cols=[[128,56,143],[155,81,224],[255,66,121],[255,162,0]];

var channels=[];
for(var i=0;i<5;i++){var y=0.15+i*0.17;channels.push({y:y,particles:[]});
  for(var p=0;p<8;p++)channels[i].particles.push({x:Math.random(),speed:0.001+Math.random()*0.003,yOff:0,phase:Math.random()*Math.PI*2});}
var t=0;
function draw(){
  ctx.clearRect(0,0,W,H);t+=0.016;
  for(var c=0;c<channels.length;c++){var ch=channels[c];var col=cols[c%4];
    ctx.beginPath();for(var x=0;x<=1;x+=0.02){var y=(ch.y-0.05)*H+Math.sin(x*5+t*0.2)*2;if(x===0)ctx.moveTo(x*W,y);else ctx.lineTo(x*W,y);}
    ctx.strokeStyle="rgba("+col[0]+","+col[1]+","+col[2]+",0.06)";ctx.lineWidth=1;ctx.stroke();
    ctx.beginPath();for(var x=0;x<=1;x+=0.02){var y=(ch.y+0.05)*H+Math.sin(x*5+t*0.2)*2;if(x===0)ctx.moveTo(x*W,y);else ctx.lineTo(x*W,y);}ctx.stroke();
    for(var p=0;p<ch.particles.length;p++){var pt=ch.particles[p];
      if(!rm){pt.x+=pt.speed;if(pt.x>1.1)pt.x=-0.1;}
      pt.yOff=Math.sin(t*0.5+pt.phase)*0.025;var px=pt.x*W,py=(ch.y+pt.yOff)*H;
      var g=ctx.createRadialGradient(px,py,0,px,py,6);
      g.addColorStop(0,"rgba("+col[0]+","+col[1]+","+col[2]+",0.3)");g.addColorStop(1,"rgba("+col[0]+","+col[1]+","+col[2]+",0)");
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(px,py,6,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);ctx.fillStyle="rgba("+col[0]+","+col[1]+","+col[2]+",0.5)";ctx.fill();}}
  if(!rm)requestAnimationFrame(draw);
}draw();

})();
</script></body></html>
