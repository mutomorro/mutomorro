<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>The organisation keeps getting better</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#FAF6F1;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block;width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh}</style></head><body><canvas id="c"></canvas>
<script>
(function(){
var canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
var dpr=window.devicePixelRatio||1,W,H;
var rm=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function resize(){W=canvas.parentElement?canvas.parentElement.clientWidth:window.innerWidth;H=canvas.parentElement?canvas.parentElement.clientHeight:window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+"px";canvas.style.height=H+"px";ctx.setTransform(dpr,0,0,dpr,0,0);}
resize();window.addEventListener("resize",resize);

var t=0;
function draw(){
  ctx.clearRect(0,0,W,H);t+=0.016;var cx=W*0.5,cy=H*0.5;var maxR=H*0.4;var rot=rm?0:t*0.05;
  ctx.beginPath();
  for(var i=0;i<150;i++){var prog=i/150;var angle=prog*Math.PI*6+rot;var r=prog*maxR;
    var px=cx+Math.cos(angle)*r,py=cy+Math.sin(angle)*r;
    if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}
  var sg=ctx.createRadialGradient(cx,cy,0,cx,cy,maxR);
  sg.addColorStop(0,"rgba(128,56,143,0.4)");sg.addColorStop(0.3,"rgba(155,81,224,0.35)");
  sg.addColorStop(0.6,"rgba(255,66,121,0.3)");sg.addColorStop(1,"rgba(255,162,0,0.25)");
  ctx.strokeStyle=sg;ctx.lineWidth=2.5;ctx.stroke();
  var cg=ctx.createRadialGradient(cx,cy,0,cx,cy,15);cg.addColorStop(0,"rgba(128,56,143,0.3)");cg.addColorStop(1,"rgba(128,56,143,0)");
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx,cy,15,0,Math.PI*2);ctx.fill();
  if(!rm)requestAnimationFrame(draw);
}draw();

})();
</script></body></html>
