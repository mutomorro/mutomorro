<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Development is a practice, not a project</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#FAF6F1;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block;width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh}</style></head><body><canvas id="c"></canvas>
<script>
(function(){
var canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
var dpr=window.devicePixelRatio||1,W,H;
var rm=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function resize(){W=canvas.parentElement?canvas.parentElement.clientWidth:window.innerWidth;H=canvas.parentElement?canvas.parentElement.clientHeight:window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+"px";canvas.style.height=H+"px";ctx.setTransform(dpr,0,0,dpr,0,0);}
resize();window.addEventListener("resize",resize);
var cols=[[128,56,143],[155,81,224],[255,66,121],[255,162,0]];

var t=0;
function draw(){
  ctx.clearRect(0,0,W,H);t+=0.016;var cx=W*0.5,cy=H*0.5;
  for(var i=0;i<4;i++){var phase=i*Math.PI*0.5;
    var breathe=rm?0.5:0.3+Math.sin(t*0.5+phase)*0.2;var r=breathe*H*0.4;var c=cols[i];
    var g=ctx.createRadialGradient(cx,cy,r*0.5,cx,cy,r);
    g.addColorStop(0,"rgba("+c[0]+","+c[1]+","+c[2]+","+breathe*0.15+")");g.addColorStop(1,"rgba("+c[0]+","+c[1]+","+c[2]+",0)");
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle="rgba("+c[0]+","+c[1]+","+c[2]+","+breathe*0.3+")";ctx.lineWidth=1.5;ctx.stroke();}
  var cp=rm?0.5:0.4+Math.sin(t*0.5)*0.1;
  ctx.beginPath();ctx.arc(cx,cy,8*cp+4,0,Math.PI*2);ctx.fillStyle="rgba(200,150,230,"+cp*0.4+")";ctx.fill();
  if(!rm)requestAnimationFrame(draw);
}draw();

})();
</script></body></html>
