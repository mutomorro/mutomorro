<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Growth does not mean growing pains</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#FAF6F1;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block;width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh}</style></head><body><canvas id="c"></canvas>
<script>
(function(){
var canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
var dpr=window.devicePixelRatio||1,W,H;
var rm=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function resize(){W=canvas.parentElement?canvas.parentElement.clientWidth:window.innerWidth;H=canvas.parentElement?canvas.parentElement.clientHeight:window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+"px";canvas.style.height=H+"px";ctx.setTransform(dpr,0,0,dpr,0,0);}
resize();window.addEventListener("resize",resize);

var radius=0.05;var targetR=0.4;var t=0;
function draw(){
  ctx.clearRect(0,0,W,H);t+=0.016;var cx=W*0.5,cy=H*0.5;
  if(!rm)radius=Math.min(targetR,radius+0.0003);else radius=0.3;
  var r=radius*H;var breathe=rm?1:1+Math.sin(t*0.4)*0.02;r*=breathe;
  ctx.beginPath();var steps=50;
  for(var i=0;i<=steps;i++){var a=i*(Math.PI*2/steps);
    var wobble=r*(1+Math.sin(a*5+t*0.5)*0.02+Math.sin(a*3)*0.01);
    if(i===0)ctx.moveTo(cx+Math.cos(a)*wobble,cy+Math.sin(a)*wobble);
    else ctx.lineTo(cx+Math.cos(a)*wobble,cy+Math.sin(a)*wobble);}
  ctx.closePath();
  var fg=ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.2);
  fg.addColorStop(0,"rgba(255,162,0,0.12)");fg.addColorStop(0.4,"rgba(255,66,121,0.08)");
  fg.addColorStop(0.8,"rgba(155,81,224,0.05)");fg.addColorStop(1,"rgba(128,56,143,0.02)");
  ctx.fillStyle=fg;ctx.fill();ctx.strokeStyle="rgba(155,81,224,0.2)";ctx.lineWidth=1.5;ctx.stroke();
  for(var i=0;i<8;i++){var a=i*(Math.PI*2/8)+(rm?0:t*0.05);var d=r*0.5;
    var px=cx+Math.cos(a)*d,py=cy+Math.sin(a)*d;
    var g=ctx.createRadialGradient(px,py,0,px,py,6);g.addColorStop(0,"rgba(255,200,100,0.2)");g.addColorStop(1,"rgba(255,200,100,0)");
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(px,py,6,0,Math.PI*2);ctx.fill();}
  if(!rm)requestAnimationFrame(draw);
}draw();

})();
</script></body></html>
