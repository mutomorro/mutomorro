<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Culture deepens as you grow</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#FAF6F1;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block;width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh}</style></head><body><canvas id="c"></canvas>
<script>
(function(){
var canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
var dpr=window.devicePixelRatio||1,W,H;
var rm=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function resize(){W=canvas.parentElement?canvas.parentElement.clientWidth:window.innerWidth;H=canvas.parentElement?canvas.parentElement.clientHeight:window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+"px";canvas.style.height=H+"px";ctx.setTransform(dpr,0,0,dpr,0,0);}
resize();window.addEventListener("resize",resize);

var size=0.1;var maxSize=0.4;var saturation=0.2;var t=0;
function draw(){
  ctx.clearRect(0,0,W,H);t+=0.016;var cx=W*0.5,cy=H*0.5;
  if(!rm){size=Math.min(maxSize,size+0.0003);saturation=Math.min(1,saturation+0.001);}
  else{size=0.3;saturation=0.7;}
  var r=size*H;var breathe=rm?1:1+Math.sin(t*0.3)*0.015;r*=breathe;
  for(var l=3;l>=0;l--){var lr=r*(1-l*0.15);var lsat=saturation*(0.5+l*0.17);var alpha=0.05+lsat*0.1;
    ctx.beginPath();ctx.arc(cx,cy,lr,0,Math.PI*2);
    var rr=Math.round(128+127*lsat),gg=Math.round(56+25*lsat),bb=Math.round(143+81*lsat);
    if(l<2){rr=Math.round(255*lsat);gg=Math.round(66+96*lsat);bb=121;}
    if(l>2){rr=255;gg=Math.round(162*lsat);bb=Math.round(50*lsat);}
    ctx.fillStyle="rgba("+rr+","+gg+","+bb+","+alpha+")";ctx.fill();}
  var cg=ctx.createRadialGradient(cx,cy,0,cx,cy,r*0.3);
  cg.addColorStop(0,"rgba(255,162,0,"+saturation*0.25+")");cg.addColorStop(1,"rgba(255,162,0,0)");
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx,cy,r*0.3,0,Math.PI*2);ctx.fill();
  if(!rm)requestAnimationFrame(draw);
}draw();

})();
</script></body></html>
