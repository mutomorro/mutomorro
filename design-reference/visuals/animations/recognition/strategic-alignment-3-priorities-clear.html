<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Priorities are clear at every level</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#FAF6F1;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block;width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh}</style></head><body><canvas id="c"></canvas>
<script>
(function(){
var canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
var dpr=window.devicePixelRatio||1,W,H;
var rm=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function resize(){W=canvas.parentElement?canvas.parentElement.clientWidth:window.innerWidth;H=canvas.parentElement?canvas.parentElement.clientHeight:window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+"px";canvas.style.height=H+"px";ctx.setTransform(dpr,0,0,dpr,0,0);}
resize();window.addEventListener("resize",resize);
var cols=[[128,56,143],[155,81,224],[255,66,121],[255,162,0]];

var layers=[];for(var l=0;l<5;l++){var particles=[];
  for(var p=0;p<10;p++)particles.push({x:0.05+Math.random()*0.9,baseY:0.12+l*0.18,vx:0.001+Math.random()*0.001,phase:Math.random()*Math.PI*2});
  layers.push({y:0.12+l*0.18,particles:particles,colIdx:l%4});}
var t=0;
function draw(){
  ctx.clearRect(0,0,W,H);t+=0.016;
  for(var l=0;l<layers.length;l++){var ly=layers[l];var c=cols[ly.colIdx];
    ctx.beginPath();ctx.moveTo(0,ly.y*H);ctx.lineTo(W,ly.y*H);ctx.strokeStyle="rgba("+c[0]+","+c[1]+","+c[2]+",0.04)";ctx.lineWidth=1;ctx.stroke();
    for(var p=0;p<ly.particles.length;p++){var pt=ly.particles[p];
      if(!rm){pt.x+=pt.vx;if(pt.x>1.1)pt.x=-0.1;}
      var py=pt.baseY+Math.sin(t*0.3+pt.phase)*0.008;var px=pt.x*W,ppy=py*H;
      ctx.save();ctx.translate(px,ppy);ctx.beginPath();ctx.moveTo(5,0);ctx.lineTo(-3,-2.5);ctx.lineTo(-3,2.5);ctx.closePath();
      ctx.fillStyle="rgba("+c[0]+","+c[1]+","+c[2]+",0.4)";ctx.fill();ctx.restore();
      ctx.beginPath();ctx.moveTo((pt.x-0.03)*W,ppy);ctx.lineTo(px,ppy);
      ctx.strokeStyle="rgba("+c[0]+","+c[1]+","+c[2]+",0.1)";ctx.lineWidth=1;ctx.stroke();}}
  if(!rm)requestAnimationFrame(draw);
}draw();

})();
</script></body></html>
