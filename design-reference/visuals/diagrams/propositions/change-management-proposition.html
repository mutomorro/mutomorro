<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Management - Proposition</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; overflow: hidden;
}
.diagram {
  width: 1920px; height: 1080px;
  position: relative; overflow: hidden;
  font-family: 'Source Sans 3', sans-serif;
  background:
    radial-gradient(ellipse at 50% 45%, rgba(128,56,143,0.1) 0%, rgba(80,30,100,0.05) 35%, transparent 65%),
    radial-gradient(ellipse at 75% 50%, rgba(255,162,0,0.04) 0%, transparent 45%),
    radial-gradient(ellipse at 25% 55%, rgba(155,81,224,0.04) 0%, transparent 45%);
}
.constellation {
  position: absolute; inset: 0; pointer-events: none;
}

.plan-label {
  position: absolute;
  left: 140px; top: 195px;
  font-size: 36px; font-weight: 300;
  color: rgba(255,255,255,0.3);
}

.terrain-label {
  position: absolute;
  font-size: 34px; font-weight: 400;
  color: rgba(255,255,255,0.45);
  text-align: center;
  line-height: 1.3;
}

.caption {
  position: absolute;
  bottom: 40px; left: 50%;
  transform: translateX(-50%);
  font-size: 30px; font-weight: 300;
  font-style: italic;
  color: rgba(255,255,255,0.25);
  white-space: nowrap;
}
</style>
</head>
<body>
<div class="diagram">

  <!-- Constellation background -->
  <svg class="constellation" viewBox="0 0 1920 1080" style="position:absolute;inset:0;pointer-events:none;">
    <circle cx="150" cy="100" r="1.5" fill="rgba(155,81,224,0.18)"/>
    <circle cx="320" cy="60" r="1" fill="rgba(200,150,220,0.12)"/>
    <circle cx="80" cy="180" r="1" fill="rgba(155,81,224,0.12)"/>
    <circle cx="1700" cy="80" r="1.5" fill="rgba(255,66,121,0.15)"/>
    <circle cx="1820" cy="160" r="1" fill="rgba(255,162,0,0.1)"/>
    <circle cx="1580" cy="120" r="1" fill="rgba(155,81,224,0.12)"/>
    <circle cx="500" cy="920" r="1.5" fill="rgba(155,81,224,0.12)"/>
    <circle cx="280" cy="960" r="1" fill="rgba(200,150,220,0.1)"/>
    <circle cx="1400" cy="940" r="1" fill="rgba(255,66,121,0.1)"/>
    <circle cx="1650" cy="900" r="1.5" fill="rgba(255,162,0,0.1)"/>
    <circle cx="900" cy="950" r="1" fill="rgba(155,81,224,0.1)"/>
    <circle cx="60" cy="450" r="1" fill="rgba(155,81,224,0.1)"/>
    <circle cx="1870" cy="400" r="1.5" fill="rgba(255,120,80,0.1)"/>
    <circle cx="1860" cy="600" r="1" fill="rgba(255,162,0,0.08)"/>
    <line x1="150" y1="100" x2="320" y2="60" stroke="rgba(155,81,224,0.05)" stroke-width="1"/>
    <line x1="80" y1="180" x2="150" y2="100" stroke="rgba(155,81,224,0.04)" stroke-width="1"/>
    <line x1="1700" y1="80" x2="1820" y2="160" stroke="rgba(255,66,121,0.04)" stroke-width="1"/>
    <line x1="1580" y1="120" x2="1700" y2="80" stroke="rgba(155,81,224,0.04)" stroke-width="1"/>
    <line x1="500" y1="920" x2="280" y2="960" stroke="rgba(155,81,224,0.04)" stroke-width="1"/>
    <line x1="1400" y1="940" x2="1650" y2="900" stroke="rgba(255,66,121,0.04)" stroke-width="1"/>
    <line x1="1870" y1="400" x2="1860" y2="600" stroke="rgba(255,120,80,0.03)" stroke-width="1"/>
    <line x1="900" y1="950" x2="1400" y2="940" stroke="rgba(155,81,224,0.03)" stroke-width="1"/>
  </svg>

  <svg width="1920" height="1080" viewBox="0 0 1920 1080" style="position:absolute;inset:0;">
    <defs>
      <linearGradient id="flowGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#80388F" stop-opacity="0.7"/>
        <stop offset="40%" stop-color="#FF4279" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#FFA200" stop-opacity="0.7"/>
      </linearGradient>
      <linearGradient id="flowGlow" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#80388F" stop-opacity="0.12"/>
        <stop offset="40%" stop-color="#FF4279" stop-opacity="0.08"/>
        <stop offset="100%" stop-color="#FFA200" stop-opacity="0.1"/>
      </linearGradient>
      <linearGradient id="terrainFill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#80388F" stop-opacity="0.07"/>
        <stop offset="100%" stop-color="#80388F" stop-opacity="0.01"/>
      </linearGradient>
    </defs>

    <!-- Terrain fill -->
    <path d="M 100 1080 L 100 580 Q 350 550 550 610 Q 750 660 950 560 Q 1200 460 1400 520 Q 1600 570 1820 440 L 1820 1080 Z"
          fill="url(#terrainFill)"/>

    <!-- Terrain outline -->
    <path d="M 100 580 Q 350 550 550 610 Q 750 660 950 560 Q 1200 460 1400 520 Q 1600 570 1820 440"
          stroke="rgba(155,81,224,0.15)" stroke-width="2.5" fill="none"/>

    <!-- The plan - straight dotted line -->
    <line x1="140" y1="270" x2="1780" y2="270"
          stroke="rgba(255,255,255,0.2)" stroke-width="4" stroke-dasharray="20,15"/>

    <!-- The flowing line -->
    <path d="M 100 530 Q 350 500 550 555 Q 750 600 950 505 Q 1200 410 1400 465 Q 1600 510 1820 385"
          stroke="url(#flowGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- Flowing line glow -->
    <path d="M 100 530 Q 350 500 550 555 Q 750 600 950 505 Q 1200 410 1400 465 Q 1600 510 1820 385"
          stroke="url(#flowGlow)" stroke-width="28" fill="none" stroke-linecap="round"/>

    <!-- Terrain glow spots -->
    <circle cx="340" cy="565" r="40" fill="rgba(155,81,224,0.06)"/>
    <circle cx="700" cy="630" r="40" fill="rgba(200,70,150,0.06)"/>
    <circle cx="1080" cy="510" r="40" fill="rgba(255,66,121,0.06)"/>
    <circle cx="1500" cy="540" r="40" fill="rgba(255,140,40,0.06)"/>
  </svg>

  <div class="plan-label">The plan on paper</div>

  <div class="terrain-label" style="left: 230px; top: 620px;">Change<br>readiness</div>
  <div class="terrain-label" style="left: 590px; top: 680px;">Sponsor<br>engagement</div>
  <div class="terrain-label" style="left: 970px; top: 580px;">Adoption<br>barriers</div>
  <div class="terrain-label" style="left: 1400px; top: 600px;">Informal<br>networks</div>

  <div class="caption">Change that works with the system, not against it</div>
</div>
</body>
</html>
