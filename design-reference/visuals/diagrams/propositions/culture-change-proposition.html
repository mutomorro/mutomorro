<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Culture Change - Proposition</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; overflow: hidden;
}
.diagram {
  width: 1920px; height: 1080px;
  position: relative; overflow: hidden;
  font-family: 'Source Sans 3', sans-serif;
  background:
    radial-gradient(ellipse at 50% 48%, rgba(128,56,143,0.12) 0%, rgba(80,30,100,0.06) 35%, transparent 70%),
    radial-gradient(ellipse at 30% 60%, rgba(255,66,121,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 40%, rgba(255,162,0,0.03) 0%, transparent 50%);
}
.constellation {
  position: absolute; inset: 0; pointer-events: none;
}

.circle {
  position: absolute;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
}

/* Centre - Culture */
.centre {
  width: 420px; height: 420px;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(255,162,0,0.14) 0%, rgba(255,66,121,0.08) 50%, rgba(155,81,224,0.04) 100%);
  border: 2px solid rgba(255,162,0,0.2);
  z-index: 10;
  flex-direction: column;
}
.centre-title {
  font-size: 72px; font-weight: 700;
  color: rgba(255,255,255,0.8);
}
.centre-sub {
  font-size: 30px; font-weight: 300;
  color: rgba(255,255,255,0.35);
  margin-top: 4px;
}

/* Condition circles */
.cond {
  width: 340px; height: 340px;
  z-index: 5;
}
.cond-label {
  font-size: 34px; font-weight: 400;
  line-height: 1.3;
  padding: 0 30px;
}

/* Individual positions - overlapping with centre */
.c1 {
  left: 50%; top: -2%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(128,56,143,0.14) 0%, rgba(128,56,143,0.04) 70%, transparent 100%);
  border: 1.5px solid rgba(128,56,143,0.2);
}
.c1 .cond-label { color: rgba(200,160,220,0.65); }

.c2 {
  right: 6%; top: 14%;
  background: radial-gradient(circle, rgba(155,81,224,0.14) 0%, rgba(155,81,224,0.04) 70%, transparent 100%);
  border: 1.5px solid rgba(155,81,224,0.2);
}
.c2 .cond-label { color: rgba(200,160,240,0.65); }

.c3 {
  right: 6%; bottom: 10%;
  background: radial-gradient(circle, rgba(255,66,121,0.12) 0%, rgba(255,66,121,0.03) 70%, transparent 100%);
  border: 1.5px solid rgba(255,66,121,0.18);
}
.c3 .cond-label { color: rgba(255,150,170,0.6); }

.c4 {
  left: 50%; bottom: -4%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(255,162,0,0.12) 0%, rgba(255,162,0,0.03) 70%, transparent 100%);
  border: 1.5px solid rgba(255,162,0,0.18);
}
.c4 .cond-label { color: rgba(255,200,130,0.6); }

.c5 {
  left: 6%; bottom: 10%;
  background: radial-gradient(circle, rgba(200,80,160,0.12) 0%, rgba(200,80,160,0.03) 70%, transparent 100%);
  border: 1.5px solid rgba(200,80,160,0.18);
}
.c5 .cond-label { color: rgba(230,160,200,0.6); }

.c6 {
  left: 6%; top: 14%;
  background: radial-gradient(circle, rgba(180,100,200,0.12) 0%, rgba(180,100,200,0.03) 70%, transparent 100%);
  border: 1.5px solid rgba(180,100,200,0.18);
}
.c6 .cond-label { color: rgba(210,170,230,0.6); }

.caption {
  position: absolute;
  bottom: 36px; left: 50%;
  transform: translateX(-50%);
  font-size: 30px; font-weight: 300;
  font-style: italic;
  color: rgba(255,255,255,0.25);
  white-space: nowrap;
}
</style>
</head>
<body>
<div class="diagram">

  <!-- Constellation background -->
  <svg class="constellation" viewBox="0 0 1920 1080">
    <!-- Faint dots scattered across -->
    <circle cx="120" cy="80" r="1.5" fill="rgba(155,81,224,0.2)"/>
    <circle cx="310" cy="150" r="1" fill="rgba(155,81,224,0.15)"/>
    <circle cx="85" cy="240" r="1.5" fill="rgba(200,150,220,0.12)"/>
    <circle cx="1650" cy="90" r="1.5" fill="rgba(255,66,121,0.15)"/>
    <circle cx="1780" cy="200" r="1" fill="rgba(255,120,80,0.12)"/>
    <circle cx="1550" cy="180" r="1.5" fill="rgba(155,81,224,0.18)"/>
    <circle cx="450" cy="60" r="1" fill="rgba(200,150,220,0.12)"/>
    <circle cx="1400" cy="50" r="1" fill="rgba(255,162,0,0.1)"/>
    <circle cx="200" cy="900" r="1.5" fill="rgba(155,81,224,0.15)"/>
    <circle cx="350" cy="980" r="1" fill="rgba(200,150,220,0.1)"/>
    <circle cx="1700" cy="920" r="1.5" fill="rgba(255,66,121,0.12)"/>
    <circle cx="1550" cy="1000" r="1" fill="rgba(255,162,0,0.1)"/>
    <circle cx="100" cy="550" r="1" fill="rgba(155,81,224,0.12)"/>
    <circle cx="1830" cy="500" r="1.5" fill="rgba(255,120,80,0.12)"/>
    <circle cx="1850" cy="700" r="1" fill="rgba(255,162,0,0.1)"/>
    <circle cx="60" cy="700" r="1.5" fill="rgba(200,150,220,0.12)"/>
    <circle cx="600" cy="30" r="1" fill="rgba(155,81,224,0.1)"/>
    <circle cx="1300" cy="1020" r="1.5" fill="rgba(255,66,121,0.1)"/>
    <circle cx="750" cy="1040" r="1" fill="rgba(155,81,224,0.1)"/>
    <circle cx="1100" cy="40" r="1.5" fill="rgba(200,150,220,0.12)"/>
    <!-- Faint connecting lines between nearby dots -->
    <line x1="120" y1="80" x2="310" y2="150" stroke="rgba(155,81,224,0.06)" stroke-width="1"/>
    <line x1="310" y1="150" x2="450" y2="60" stroke="rgba(155,81,224,0.04)" stroke-width="1"/>
    <line x1="85" y1="240" x2="120" y2="80" stroke="rgba(155,81,224,0.05)" stroke-width="1"/>
    <line x1="1650" y1="90" x2="1780" y2="200" stroke="rgba(255,66,121,0.05)" stroke-width="1"/>
    <line x1="1550" y1="180" x2="1650" y2="90" stroke="rgba(155,81,224,0.05)" stroke-width="1"/>
    <line x1="1400" y1="50" x2="1550" y2="180" stroke="rgba(200,150,220,0.04)" stroke-width="1"/>
    <line x1="200" y1="900" x2="350" y2="980" stroke="rgba(155,81,224,0.05)" stroke-width="1"/>
    <line x1="1700" y1="920" x2="1550" y2="1000" stroke="rgba(255,66,121,0.04)" stroke-width="1"/>
    <line x1="100" y1="550" x2="60" y2="700" stroke="rgba(155,81,224,0.04)" stroke-width="1"/>
    <line x1="1830" y1="500" x2="1850" y2="700" stroke="rgba(255,120,80,0.04)" stroke-width="1"/>
    <line x1="600" y1="30" x2="450" y2="60" stroke="rgba(155,81,224,0.04)" stroke-width="1"/>
    <line x1="1100" y1="40" x2="1400" y2="50" stroke="rgba(200,150,220,0.04)" stroke-width="1"/>
    <line x1="750" y1="1040" x2="1300" y2="1020" stroke="rgba(155,81,224,0.03)" stroke-width="1"/>
  </svg>

  <div class="circle cond c1"><span class="cond-label">How decisions<br>get made</span></div>
  <div class="circle cond c2"><span class="cond-label">How people<br>collaborate</span></div>
  <div class="circle cond c3"><span class="cond-label">What gets<br>rewarded</span></div>
  <div class="circle cond c4"><span class="cond-label">How knowledge<br>moves</span></div>
  <div class="circle cond c5"><span class="cond-label">What leaders<br>pay attention to</span></div>
  <div class="circle cond c6"><span class="cond-label">How change<br>happens</span></div>

  <div class="circle centre">
    <span class="centre-title">Culture</span>
    <span class="centre-sub">where energy flows</span>
  </div>

  <div class="caption">Change the conditions, and culture shifts naturally</div>
</div>
</body>
</html>
