<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organisational Design - Proposition</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; overflow: hidden;
}
.diagram {
  width: 1920px; height: 1080px;
  position: relative; overflow: hidden;
  font-family: 'Source Sans 3', sans-serif;
  background: radial-gradient(ellipse at 50% 48%, rgba(128,56,143,0.12) 0%, rgba(80,30,100,0.06) 35%, transparent 70%), radial-gradient(ellipse at 30% 60%, rgba(255,66,121,0.04) 0%, transparent 50%), radial-gradient(ellipse at 70% 40%, rgba(255,162,0,0.03) 0%, transparent 50%);
}
.constellation { position: absolute; inset: 0; pointer-events: none; }
.caption {
  position: absolute;
  bottom: 36px; left: 50%;
  transform: translateX(-50%);
  font-size: 30px; font-weight: 300;
  font-style: italic;
  color: rgba(255,255,255,0.25);
  white-space: nowrap;
}
</style>
</head>
<body>
<div class="diagram">

  <svg class="constellation" viewBox="0 0 1920 1080">
    <circle cx="110" cy="75" r="1.5" fill="rgba(155,81,224,0.18)"/>
    <circle cx="290" cy="140" r="1" fill="rgba(200,150,220,0.12)"/>
    <circle cx="75" cy="210" r="1.5" fill="rgba(155,81,224,0.12)"/>
    <circle cx="1720" cy="70" r="1.5" fill="rgba(255,66,121,0.15)"/>
    <circle cx="1840" cy="180" r="1" fill="rgba(255,162,0,0.1)"/>
    <circle cx="1580" cy="110" r="1" fill="rgba(155,81,224,0.12)"/>
    <circle cx="470" cy="50" r="1" fill="rgba(200,150,220,0.1)"/>
    <circle cx="1380" cy="45" r="1" fill="rgba(255,162,0,0.08)"/>
    <circle cx="190" cy="920" r="1.5" fill="rgba(155,81,224,0.12)"/>
    <circle cx="340" cy="990" r="1" fill="rgba(200,150,220,0.1)"/>
    <circle cx="1690" cy="930" r="1" fill="rgba(255,66,121,0.1)"/>
    <circle cx="1540" cy="1010" r="1.5" fill="rgba(255,162,0,0.08)"/>
    <circle cx="55" cy="520" r="1" fill="rgba(155,81,224,0.1)"/>
    <circle cx="1860" cy="490" r="1.5" fill="rgba(255,120,80,0.1)"/>
    <circle cx="1870" cy="690" r="1" fill="rgba(255,162,0,0.08)"/>
    <circle cx="45" cy="720" r="1.5" fill="rgba(200,150,220,0.1)"/>
    <circle cx="800" cy="30" r="1" fill="rgba(155,81,224,0.08)"/>
    <circle cx="1120" cy="1050" r="1" fill="rgba(155,81,224,0.08)"/>
    <line x1="110" y1="75" x2="290" y2="140" stroke="rgba(155,81,224,0.05)" stroke-width="1"/>
    <line x1="75" y1="210" x2="110" y2="75" stroke="rgba(155,81,224,0.04)" stroke-width="1"/>
    <line x1="290" y1="140" x2="470" y2="50" stroke="rgba(155,81,224,0.03)" stroke-width="1"/>
    <line x1="1720" y1="70" x2="1840" y2="180" stroke="rgba(255,66,121,0.04)" stroke-width="1"/>
    <line x1="1580" y1="110" x2="1720" y2="70" stroke="rgba(155,81,224,0.04)" stroke-width="1"/>
    <line x1="190" y1="920" x2="340" y2="990" stroke="rgba(155,81,224,0.04)" stroke-width="1"/>
    <line x1="1690" y1="930" x2="1540" y2="1010" stroke="rgba(255,66,121,0.03)" stroke-width="1"/>
    <line x1="55" y1="520" x2="45" y2="720" stroke="rgba(155,81,224,0.03)" stroke-width="1"/>
    <line x1="1860" y1="490" x2="1870" y2="690" stroke="rgba(255,120,80,0.03)" stroke-width="1"/>
  </svg>


  <style>
    .layer {
      position: absolute;
      left: 50%; transform: translateX(-50%);
      border-radius: 120px;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
    }
    .layer-label {
      font-weight: 600; letter-spacing: 1px;
    }
    .layer-sub {
      font-weight: 300; margin-top: 2px;
    }
    .l5 {
      width: 1500px; height: 200px; top: 6%;
      background: rgba(128,56,143,0.06);
      border: 1.5px solid rgba(128,56,143,0.15);
    }
    .l5 .layer-label { font-size: 32px; color: rgba(200,160,230,0.55); }
    .l5 .layer-sub { font-size: 26px; color: rgba(200,160,230,0.3); }
    .l4 {
      width: 1260px; height: 180px; top: 21%;
      background: rgba(155,81,224,0.05);
      border: 1.5px solid rgba(155,81,224,0.15);
    }
    .l4 .layer-label { font-size: 32px; color: rgba(200,170,240,0.55); }
    .l4 .layer-sub { font-size: 26px; color: rgba(200,170,240,0.3); }
    .l3 {
      width: 1020px; height: 180px; top: 37%;
      background: rgba(200,80,160,0.05);
      border: 1.5px solid rgba(200,80,160,0.15);
    }
    .l3 .layer-label { font-size: 32px; color: rgba(230,160,200,0.55); }
    .l3 .layer-sub { font-size: 26px; color: rgba(230,160,200,0.3); }
    .l2 {
      width: 780px; height: 180px; top: 53%;
      background: rgba(255,66,121,0.04);
      border: 1.5px solid rgba(255,66,121,0.15);
    }
    .l2 .layer-label { font-size: 32px; color: rgba(255,150,170,0.55); }
    .l2 .layer-sub { font-size: 26px; color: rgba(255,150,170,0.3); }
    .l1 {
      width: 540px; height: 180px; top: 69%;
      background: rgba(255,162,0,0.04);
      border: 1.5px solid rgba(255,162,0,0.15);
    }
    .l1 .layer-label { font-size: 32px; color: rgba(255,200,130,0.55); }
    .l1 .layer-sub { font-size: 26px; color: rgba(255,200,130,0.3); }
    .glow-centre {
      position: absolute;
      left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 300px; height: 600px;
      background: radial-gradient(ellipse, rgba(255,200,100,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
  </style>

  <div class="glow-centre"></div>
  <div class="layer l5">
    <div><span class="layer-label">Structure</span><br><span class="layer-sub">spans, reporting lines, governance</span></div>
  </div>
  <div class="layer l4">
    <div><span class="layer-label">Operations</span><br><span class="layer-sub">workflows, handoffs, operating model</span></div>
  </div>
  <div class="layer l3">
    <div><span class="layer-label">Collaboration</span><br><span class="layer-sub">cross-functional working, decision rights</span></div>
  </div>
  <div class="layer l2">
    <div><span class="layer-label">Culture</span><br><span class="layer-sub">behaviours, norms, what gets rewarded</span></div>
  </div>
  <div class="layer l1">
    <div><span class="layer-label">Capability</span><br><span class="layer-sub">skills, capacity, development pathways</span></div>
  </div>

  <div class="caption">Design the whole organisation, not just the chart</div>

</div>
</body>
</html>
