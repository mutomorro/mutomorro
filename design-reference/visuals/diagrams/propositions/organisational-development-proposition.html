<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organisational Development - Proposition</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; overflow: hidden;
}
.diagram {
  width: 1920px; height: 1080px;
  position: relative; overflow: hidden;
  font-family: 'Source Sans 3', sans-serif;
  background: radial-gradient(ellipse at 50% 48%, rgba(128,56,143,0.12) 0%, rgba(80,30,100,0.06) 35%, transparent 70%), radial-gradient(ellipse at 30% 60%, rgba(255,66,121,0.04) 0%, transparent 50%), radial-gradient(ellipse at 70% 40%, rgba(255,162,0,0.03) 0%, transparent 50%);
}
.constellation { position: absolute; inset: 0; pointer-events: none; }
.caption {
  position: absolute;
  bottom: 36px; left: 50%;
  transform: translateX(-50%);
  font-size: 30px; font-weight: 300;
  font-style: italic;
  color: rgba(255,255,255,0.25);
  white-space: nowrap;
}
</style>
</head>
<body>
<div class="diagram">

  <svg class="constellation" viewBox="0 0 1920 1080">
    <circle cx="110" cy="75" r="1.5" fill="rgba(155,81,224,0.18)"/>
    <circle cx="290" cy="140" r="1" fill="rgba(200,150,220,0.12)"/>
    <circle cx="75" cy="210" r="1.5" fill="rgba(155,81,224,0.12)"/>
    <circle cx="1720" cy="70" r="1.5" fill="rgba(255,66,121,0.15)"/>
    <circle cx="1840" cy="180" r="1" fill="rgba(255,162,0,0.1)"/>
    <circle cx="1580" cy="110" r="1" fill="rgba(155,81,224,0.12)"/>
    <circle cx="470" cy="50" r="1" fill="rgba(200,150,220,0.1)"/>
    <circle cx="1380" cy="45" r="1" fill="rgba(255,162,0,0.08)"/>
    <circle cx="190" cy="920" r="1.5" fill="rgba(155,81,224,0.12)"/>
    <circle cx="340" cy="990" r="1" fill="rgba(200,150,220,0.1)"/>
    <circle cx="1690" cy="930" r="1" fill="rgba(255,66,121,0.1)"/>
    <circle cx="1540" cy="1010" r="1.5" fill="rgba(255,162,0,0.08)"/>
    <circle cx="55" cy="520" r="1" fill="rgba(155,81,224,0.1)"/>
    <circle cx="1860" cy="490" r="1.5" fill="rgba(255,120,80,0.1)"/>
    <circle cx="1870" cy="690" r="1" fill="rgba(255,162,0,0.08)"/>
    <circle cx="45" cy="720" r="1.5" fill="rgba(200,150,220,0.1)"/>
    <circle cx="800" cy="30" r="1" fill="rgba(155,81,224,0.08)"/>
    <circle cx="1120" cy="1050" r="1" fill="rgba(155,81,224,0.08)"/>
    <line x1="110" y1="75" x2="290" y2="140" stroke="rgba(155,81,224,0.05)" stroke-width="1"/>
    <line x1="75" y1="210" x2="110" y2="75" stroke="rgba(155,81,224,0.04)" stroke-width="1"/>
    <line x1="290" y1="140" x2="470" y2="50" stroke="rgba(155,81,224,0.03)" stroke-width="1"/>
    <line x1="1720" y1="70" x2="1840" y2="180" stroke="rgba(255,66,121,0.04)" stroke-width="1"/>
    <line x1="1580" y1="110" x2="1720" y2="70" stroke="rgba(155,81,224,0.04)" stroke-width="1"/>
    <line x1="190" y1="920" x2="340" y2="990" stroke="rgba(155,81,224,0.04)" stroke-width="1"/>
    <line x1="1690" y1="930" x2="1540" y2="1010" stroke="rgba(255,66,121,0.03)" stroke-width="1"/>
    <line x1="55" y1="520" x2="45" y2="720" stroke="rgba(155,81,224,0.03)" stroke-width="1"/>
    <line x1="1860" y1="490" x2="1870" y2="690" stroke="rgba(255,120,80,0.03)" stroke-width="1"/>
  </svg>


  <style>
    .spiral-labels {
      position: absolute; inset: 0; pointer-events: none;
    }
    .s-label {
      position: absolute; font-size: 30px; font-weight: 400;
      text-align: center;
    }
    .s-centre {
      position: absolute; left: 50%; top: 46%;
      transform: translate(-50%, -50%);
      font-size: 36px; font-weight: 600;
      color: rgba(255,200,130,0.55);
    }
  </style>

  <svg style="position:absolute;inset:0;" viewBox="0 0 1920 1080">
    <defs>
      <linearGradient id="spiralGrad" x1="0.5" y1="0.5" x2="1" y2="0">
        <stop offset="0%" stop-color="#80388F" stop-opacity="0.5"/>
        <stop offset="40%" stop-color="#FF4279" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#FFA200" stop-opacity="0.5"/>
      </linearGradient>
    </defs>
    <!-- Spiral path -->
    <path d="M 960 497
             C 990 420, 1060 400, 1100 440
             C 1150 490, 1130 580, 1060 610
             C 970 650, 870 600, 840 520
             C 800 420, 860 320, 970 290
             C 1100 255, 1230 320, 1260 450
             C 1295 600, 1200 730, 1040 770
             C 860 810, 710 710, 680 530
             C 645 330, 770 180, 970 140
             C 1200 100, 1390 230, 1420 460
             C 1450 700, 1290 870, 1040 920
             C 780 970, 570 810, 530 560
             C 490 290, 660 90, 960 50"
          stroke="url(#spiralGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 960 497
             C 990 420, 1060 400, 1100 440
             C 1150 490, 1130 580, 1060 610
             C 970 650, 870 600, 840 520
             C 800 420, 860 320, 970 290
             C 1100 255, 1230 320, 1260 450
             C 1295 600, 1200 730, 1040 770
             C 860 810, 710 710, 680 530
             C 645 330, 770 180, 970 140
             C 1200 100, 1390 230, 1420 460
             C 1450 700, 1290 870, 1040 920
             C 780 970, 570 810, 530 560
             C 490 290, 660 90, 960 50"
          stroke="rgba(155,81,224,0.06)" stroke-width="20" fill="none" stroke-linecap="round"/>
  </svg>

  <div class="s-centre">Starting point</div>

  <div class="spiral-labels">
    <div class="s-label" style="right: 340px; top: 370px; color: rgba(200,170,240,0.5);">Structure</div>
    <div class="s-label" style="right: 310px; bottom: 240px; color: rgba(255,150,170,0.45);">Operations</div>
    <div class="s-label" style="left: 340px; bottom: 200px; color: rgba(255,180,130,0.45);">Culture</div>
    <div class="s-label" style="left: 310px; top: 280px; color: rgba(200,160,230,0.45);">Capability</div>
  </div>

  <div class="caption">Develop the whole organisation, not just the parts</div>

</div>
</body>
</html>
