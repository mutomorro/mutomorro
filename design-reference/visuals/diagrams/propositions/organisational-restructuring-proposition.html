<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organisational Restructuring - Proposition</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; overflow: hidden;
}
.diagram {
  width: 1920px; height: 1080px;
  position: relative; overflow: hidden;
  font-family: 'Source Sans 3', sans-serif;
  background: radial-gradient(ellipse at 50% 45%, rgba(128,56,143,0.1) 0%, rgba(80,30,100,0.05) 35%, transparent 65%), radial-gradient(ellipse at 75% 50%, rgba(255,162,0,0.04) 0%, transparent 45%), radial-gradient(ellipse at 25% 55%, rgba(155,81,224,0.04) 0%, transparent 45%);
}
.constellation { position: absolute; inset: 0; pointer-events: none; }
.caption {
  position: absolute;
  bottom: 36px; left: 50%;
  transform: translateX(-50%);
  font-size: 30px; font-weight: 300;
  font-style: italic;
  color: rgba(255,255,255,0.25);
  white-space: nowrap;
}
</style>
</head>
<body>
<div class="diagram">

  <svg class="constellation" viewBox="0 0 1920 1080">
    <circle cx="110" cy="75" r="1.5" fill="rgba(155,81,224,0.18)"/>
    <circle cx="290" cy="140" r="1" fill="rgba(200,150,220,0.12)"/>
    <circle cx="75" cy="210" r="1.5" fill="rgba(155,81,224,0.12)"/>
    <circle cx="1720" cy="70" r="1.5" fill="rgba(255,66,121,0.15)"/>
    <circle cx="1840" cy="180" r="1" fill="rgba(255,162,0,0.1)"/>
    <circle cx="1580" cy="110" r="1" fill="rgba(155,81,224,0.12)"/>
    <circle cx="470" cy="50" r="1" fill="rgba(200,150,220,0.1)"/>
    <circle cx="1380" cy="45" r="1" fill="rgba(255,162,0,0.08)"/>
    <circle cx="190" cy="920" r="1.5" fill="rgba(155,81,224,0.12)"/>
    <circle cx="340" cy="990" r="1" fill="rgba(200,150,220,0.1)"/>
    <circle cx="1690" cy="930" r="1" fill="rgba(255,66,121,0.1)"/>
    <circle cx="1540" cy="1010" r="1.5" fill="rgba(255,162,0,0.08)"/>
    <circle cx="55" cy="520" r="1" fill="rgba(155,81,224,0.1)"/>
    <circle cx="1860" cy="490" r="1.5" fill="rgba(255,120,80,0.1)"/>
    <circle cx="1870" cy="690" r="1" fill="rgba(255,162,0,0.08)"/>
    <circle cx="45" cy="720" r="1.5" fill="rgba(200,150,220,0.1)"/>
    <circle cx="800" cy="30" r="1" fill="rgba(155,81,224,0.08)"/>
    <circle cx="1120" cy="1050" r="1" fill="rgba(155,81,224,0.08)"/>
    <line x1="110" y1="75" x2="290" y2="140" stroke="rgba(155,81,224,0.05)" stroke-width="1"/>
    <line x1="75" y1="210" x2="110" y2="75" stroke="rgba(155,81,224,0.04)" stroke-width="1"/>
    <line x1="290" y1="140" x2="470" y2="50" stroke="rgba(155,81,224,0.03)" stroke-width="1"/>
    <line x1="1720" y1="70" x2="1840" y2="180" stroke="rgba(255,66,121,0.04)" stroke-width="1"/>
    <line x1="1580" y1="110" x2="1720" y2="70" stroke="rgba(155,81,224,0.04)" stroke-width="1"/>
    <line x1="190" y1="920" x2="340" y2="990" stroke="rgba(155,81,224,0.04)" stroke-width="1"/>
    <line x1="1690" y1="930" x2="1540" y2="1010" stroke="rgba(255,66,121,0.03)" stroke-width="1"/>
    <line x1="55" y1="520" x2="45" y2="720" stroke="rgba(155,81,224,0.03)" stroke-width="1"/>
    <line x1="1860" y1="490" x2="1870" y2="690" stroke="rgba(255,120,80,0.03)" stroke-width="1"/>
  </svg>


  <style>
    .frame {
      position: absolute; top: 12%; bottom: 16%;
      border-radius: 16px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px;
    }
    .frame-current {
      left: 4%; width: 26%;
      background: rgba(128,56,143,0.06);
      border: 1.5px solid rgba(128,56,143,0.15);
    }
    .frame-transition {
      left: 33%; width: 34%;
      background: rgba(255,66,121,0.05);
      border: 2px solid rgba(255,66,121,0.18);
    }
    .frame-new {
      right: 4%; width: 26%;
      background: rgba(255,162,0,0.05);
      border: 1.5px solid rgba(255,162,0,0.15);
    }
    .frame-title {
      font-size: 34px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 30px;
    }
    .frame-current .frame-title { color: rgba(200,160,230,0.55); }
    .frame-transition .frame-title { color: rgba(255,150,170,0.6); }
    .frame-new .frame-title { color: rgba(255,200,130,0.55); }
    .frame-items {
      font-size: 32px; font-weight: 300; line-height: 1.8;
    }
    .frame-current .frame-items { color: rgba(200,160,230,0.4); }
    .frame-transition .frame-items { color: rgba(255,150,170,0.4); }
    .frame-new .frame-items { color: rgba(255,200,130,0.4); }
    .arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      font-size: 48px; color: rgba(255,255,255,0.12);
    }
    .arrow-1 { left: 30.5%; }
    .arrow-2 { left: 67.5%; }
  </style>

  <div class="frame frame-current">
    <span class="frame-title">Current</span>
    <div class="frame-items">Strained connections<br>Workarounds<br>Bottlenecks<br>Unclear accountability</div>
  </div>
  <span class="arrow arrow-1">&#x2192;</span>
  <div class="frame frame-transition">
    <span class="frame-title">Transition</span>
    <div class="frame-items">Knowledge transferred<br>Teams re-forming<br>Relationships maintained<br>Support in place</div>
  </div>
  <span class="arrow arrow-2">&#x2192;</span>
  <div class="frame frame-new">
    <span class="frame-title">New</span>
    <div class="frame-items">Roles that make sense<br>Work that flows<br>Networks intact<br>Room to grow</div>
  </div>

  <div class="caption">Design the structure around how work needs to work</div>

</div>
</body>
</html>
